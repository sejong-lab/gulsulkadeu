<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>생활스포츠지도사 2급 보디빌딩 · 구술카드</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap');

:root{
  --bg:#f4f5f8;--surface:#fff;--surface2:#eef0f5;--border:#c9cee0;
  --accent:#4f5de8;--gul:#2dd4a0;--sil:#f59e0b;
  --accent2:#e05c5c;--accent3:#3ecf8e;--accent4:#f0a030;--tab-c:var(--accent2);
  --text:#1a1c2a;--text-md:#5a5f7a;--text-muted:#5a5f7a;--text-dim:#9aa0bb;
  --card:#fff;
  --mono:'JetBrains Mono',monospace;--sans:'Noto Sans KR',sans-serif;
  --cc:#4f5de8;
}
:root.dark{
  --bg:#0d0e12;--surface:#14161e;--surface2:#1c1e28;--border:#252838;
  --accent:#6370f0;--gul:#2dd4a0;--sil:#f59e0b;
  --text:#e8eaf0;--text-md:#7a7f96;--text-muted:#7a7f96;--text-dim:#3a3f56;
  --card:#14161e;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;max-width:480px;margin:0 auto;-webkit-font-smoothing:antialiased;padding-bottom:calc(78px + env(safe-area-inset-bottom));}

/* ── 상단바 (제목 좌 · D-day 중앙 · 테마 우) ── */
.topbar{background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:30;padding:10px 14px;}
.topbar-row2{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;}
.dday-badge{justify-self:center;font-family:var(--mono);font-size:12.5px;font-weight:700;color:#fff;
  background:linear-gradient(135deg,var(--accent),#8b5cf6);border:none;border-radius:20px;
  padding:5px 16px;cursor:pointer;letter-spacing:.05em;box-shadow:0 2px 12px color-mix(in srgb,var(--accent) 40%,transparent);
  transition:transform .12s;}
.dday-badge:hover{transform:translateY(-1px);}
.hdr-title{justify-self:start;font-size:12px;font-weight:900;letter-spacing:-.02em;display:flex;align-items:center;gap:6px;}
.hdr-grad{background:linear-gradient(120deg,var(--accent),#8b7bf0 70%);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
.hdr-tag{font-family:var(--mono);font-size:10px;font-weight:700;color:#fff;background:var(--accent);border-radius:5px;padding:2px 7px;letter-spacing:.02em;}
.btn-theme{width:30px;height:30px;border:1px solid var(--border);background:var(--surface2);border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;transition:border-color .15s;}
.btn-theme:hover{border-color:var(--accent);}
.btn-search{width:30px;height:30px;border:1px solid var(--border);background:var(--surface2);border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;transition:border-color .15s;}
.btn-search:hover{border-color:var(--accent);}
.topbar-right{display:flex;gap:6px;justify-self:end;align-items:center;}
.search-overlay{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.55);justify-content:center;padding-top:64px;}
.search-overlay.open{display:flex;}
.search-box{background:var(--surface);border-radius:16px;width:min(92vw,480px);max-height:76vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,.35);}
.search-input-row{display:flex;align-items:center;gap:8px;padding:12px 14px;border-bottom:1px solid var(--border);flex-shrink:0;}
.search-input-row span.si-icon{font-size:16px;}
.search-input-row input{flex:1;background:transparent;border:none;outline:none;font-size:15px;color:var(--text);font-family:var(--sans);}
.search-input-row button.si-close{background:transparent;border:none;cursor:pointer;font-size:16px;color:var(--text-muted);padding:2px 6px;border-radius:6px;line-height:1;}
.search-input-row button.si-close:hover{background:var(--surface2);}
.search-results{overflow-y:auto;flex:1;}
.search-result-item{padding:11px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s;}
.search-result-item:hover{background:var(--surface2);}
.search-result-item:last-child{border-bottom:none;}
.sr-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;background:var(--accent);color:#fff;display:inline-block;margin-bottom:5px;font-family:var(--mono);letter-spacing:.04em;}
.sr-q{font-size:13px;font-weight:600;color:var(--text);line-height:1.45;}
.sr-kw{font-size:11px;color:var(--text-muted);margin-top:3px;}
.search-no-result{padding:28px;text-align:center;color:var(--text-muted);font-size:13px;}

/* ── 필터 바 ── */
.filter-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:6px 12px 0;}
.filter-main{display:flex;flex-wrap:wrap;gap:4px;row-gap:6px;align-items:center;padding-bottom:6px;}
.btn-flt{font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.04em;padding:5px 12px;border:1.5px solid var(--border);border-radius:6px;background:transparent;color:var(--text-md);cursor:pointer;white-space:nowrap;transition:all .12s;}
.btn-flt:hover{border-color:var(--accent);color:var(--text);}
.btn-flt.act{background:var(--accent);border-color:var(--accent);color:#fff;}
.btn-flt.act.gul{background:var(--gul);border-color:var(--gul);}
.btn-flt.act.sil{background:var(--sil);border-color:var(--sil);}
.btn-wrong{font-family:var(--mono);font-size:10px;font-weight:700;padding:5px 9px;border:1.5px solid var(--border);border-radius:6px;background:transparent;color:var(--text-dim);cursor:pointer;transition:all .12s;display:flex;align-items:center;gap:3px;flex-shrink:0;}
.btn-wrong:hover{border-color:#f43f5e;color:#f43f5e;}
.btn-wrong .wc{background:color-mix(in srgb,#f43f5e 15%,transparent);color:#f43f5e;border-radius:4px;padding:0 4px;font-size:10px;}
.sub-filter-row{display:flex;gap:4px;flex-wrap:nowrap;overflow-x:auto;padding-bottom:6px;scrollbar-width:none;}
.sub-filter-row::-webkit-scrollbar{display:none;}
.sub-filter-row:empty{display:none;}
.btn-sub{font-family:var(--sans);font-size:11px;font-weight:500;padding:4px 10px;border:1px solid var(--border);border-radius:20px;background:transparent;color:var(--text-md);cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .12s;}
.btn-sub:hover{border-color:var(--accent);color:var(--text);}
.btn-sub.act{background:var(--accent);border-color:var(--accent);color:#fff;}

/* ── 진행 영역 : 좌 "과목 (소분류)" / 우 진행바+별표+숫자 ── */
.prog-area{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;padding:9px 13px 8px;}
.prog-subject{flex:1;min-width:0;font-size:15px;font-weight:800;letter-spacing:-.01em;line-height:1.3;padding:1px 0 1px 11px;border-left:3px solid var(--accent);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.prog-subject .ps-cat{font-weight:800;}
.prog-subject .ps-sub{font-weight:500;color:var(--text-md);font-size:13px;margin-left:3px;}
.prog-right{width:50%;flex-shrink:0;display:flex;flex-direction:column;gap:5px;}
.prog-bar{width:100%;height:4px;background:var(--border);border-radius:3px;overflow:hidden;}
.prog-fill{height:100%;background:var(--cc);border-radius:3px;transition:width .3s ease;}
.prog-meta-row{display:flex;align-items:center;justify-content:space-between;}
.prog-stars{font-size:12px;color:var(--sil);letter-spacing:1px;}
.prog-count{font-family:var(--mono);font-size:10px;color:var(--text-dim);}

/* ── 카드 ── */
#card{margin:8px 10px 0;background:var(--surface);border:1.5px solid var(--border);border-top:3px solid var(--cc);border-radius:13px;overflow:hidden;--cc:var(--accent);}
.ck-hdr{display:flex;align-items:center;gap:6px;padding:8px 12px 6px;border-bottom:1px solid var(--border);}
.ck-cat{font-family:var(--mono);font-size:10px;font-weight:700;color:#fff;background:var(--cc);border-radius:5px;padding:2px 7px;flex-shrink:0;}
.ck-sub{font-size:11px;color:var(--text-md);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ck-freq{font-size:10px;color:var(--sil);flex-shrink:0;}
.ck-num{font-family:var(--mono);font-size:10px;color:var(--text-dim);flex-shrink:0;}

.ck-q{display:flex;align-items:center;gap:9px;padding:12px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .13s;}
.ck-q:hover{background:var(--surface2);}
.ck-q-txt{font-size:16px;font-weight:700;line-height:1.4;flex:1;color:var(--text);}
.ck-q-hint{font-family:var(--sans);font-size:10px;font-weight:700;color:var(--cc);border:1px solid color-mix(in srgb,var(--cc) 40%,transparent);border-radius:20px;padding:4px 11px;white-space:nowrap;flex-shrink:0;}
#card.allopen .ck-q-hint::after{content:' ✓';}
#card.allopen .ck-q-hint{background:color-mix(in srgb,var(--cc) 14%,transparent);}

.ck-ctrl{display:flex;gap:7px;align-items:center;padding:8px 12px;border-bottom:1px solid var(--border);}
.ck-blind-btn{font-size:12px;font-weight:500;padding:6px 13px;border:1.5px solid var(--border);border-radius:7px;background:transparent;color:var(--text-md);cursor:pointer;transition:all .13s;flex-shrink:0;}
.ck-blind-btn.on{background:color-mix(in srgb,var(--accent) 14%,transparent);border-color:var(--accent);color:var(--accent);}
.ck-timer-btn{font-family:var(--mono);font-size:11px;font-weight:700;padding:6px 11px;border:1.5px solid var(--border);border-radius:7px;background:transparent;color:var(--text-dim);cursor:pointer;margin-left:auto;flex-shrink:0;transition:all .13s;}
.ck-timer-btn.running{border-color:var(--sil);color:var(--sil);background:color-mix(in srgb,var(--sil) 15%,transparent);}

.ck-summary{display:flex;gap:8px;padding:10px 12px;background:var(--surface2);border-bottom:1px solid var(--border);}
.ck-sum-lbl{font-family:var(--mono);font-size:9px;font-weight:700;color:var(--accent);border:1px solid color-mix(in srgb,var(--accent) 40%,transparent);border-radius:4px;padding:2px 6px;height:fit-content;flex-shrink:0;text-transform:uppercase;}
.ck-sum-txt{font-size:13px;line-height:1.5;color:var(--text-md);flex:1;transition:filter .2s;}
#card.blind .ck-sum-txt{filter:blur(6px);user-select:none;}
#card.blind .ck-summary.show .ck-sum-txt,#card.allopen .ck-sum-txt{filter:none;}

/* ── 답안 (아코디언 기본) ── */
.ck-grid{display:flex;flex-direction:column;gap:6px;padding:10px 10px 4px;}
.ci{border:1.5px solid var(--border);border-radius:10px;overflow:hidden;cursor:pointer;background:var(--surface);transition:border-color .13s,background .13s;}
.ci:hover{border-color:var(--cc);}
.ci.open{border-color:var(--cc);background:color-mix(in srgb,var(--cc) 8%,transparent);}
.ci-head{display:flex;align-items:center;gap:10px;padding:13px 14px;}
.ci-n{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--cc);flex-shrink:0;}
.ci-kw{flex:1;font-size:14.5px;font-weight:700;line-height:1.4;color:var(--text);transition:filter .2s;word-break:keep-all;}
#card.blind .ci-kw{filter:blur(6px);user-select:none;}
#card.blind .ci.open .ci-kw,#card.allopen .ci-kw{filter:none;}
.ci-chev{font-size:11px;color:var(--text-dim);flex-shrink:0;transition:transform .2s;}
.ci.open .ci-chev{transform:rotate(180deg);}
.ci-full{max-height:0;overflow:hidden;font-size:13px;color:var(--text-md);line-height:1.65;padding:0 14px;transition:max-height .25s ease,padding .25s ease;word-break:keep-all;}
.ci.open .ci-full,#card.allopen .ci-full{max-height:400px;padding:0 14px 13px;}
.ci-full em{font-style:normal;font-weight:700;color:var(--cc);}
.ci-full .arrow{color:var(--cc);font-weight:700;}
/* 그리드 모드 오버라이드 */
#card.grid-mode .ck-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
#card.grid-mode .ci{padding:10px 12px;overflow:hidden;}
#card.grid-mode .ci.span2{grid-column:1/-1;}
#card.grid-mode .ci.open{color:var(--cc);}
#card.grid-mode .ci-head{flex-direction:column;align-items:flex-start;gap:2px;padding:0;}
#card.grid-mode .ci-n{font-size:11px;}
#card.grid-mode .ci-kw{font-size:13px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;transition:none;}
#card.grid-mode .ci-chev{display:none;}
#card.grid-mode .ci-full{display:none !important;}
#card.grid-mode .ci-n{display:none;}
#card.grid-mode .ci-kw{display:none;}
#card.grid-mode .ci-label{display:block;font-size:16px;font-weight:700;color:var(--text);line-height:1.3;word-break:keep-all;}
#card.grid-mode .ci.open .ci-label{color:var(--cc);}
.ci-label{display:none;}
#card.blind.grid-mode .ci-kw{filter:blur(6px);user-select:none;}
#card.blind.grid-mode .ci.open .ci-kw,#card.allopen.grid-mode .ci-kw{filter:none;}
/* 그리드 상세박스 */
.ci-detail{margin:0 10px 8px;padding:12px 14px;background:var(--surface);border:1.5px solid var(--border);border-radius:10px;font-size:13px;color:var(--text-md);line-height:1.65;display:none;word-break:keep-all;}
.ci-detail.show{display:block;}
.ci-detail em{font-style:normal;font-weight:700;color:var(--cc);}
.ci-detail .arrow{color:var(--cc);font-weight:700;}
/* 레이아웃 토글 버튼 */
.ck-layout-btn{font-size:11px;font-weight:600;padding:5px 9px;border:1.5px solid var(--border);border-radius:7px;background:transparent;color:var(--text-md);cursor:pointer;flex-shrink:0;transition:all .13s;}
.ck-layout-btn:hover,.ck-layout-btn.active{border-color:var(--cc);color:var(--cc);background:color-mix(in srgb,var(--cc) 8%,transparent);}

.ck-bottom{border-top:1px solid var(--border);}
.ck-bottom-row{display:flex;}
.ck-def-btn,.ck-prin-btn{flex:1;font-size:12px;font-weight:500;padding:11px 10px;border:none;background:transparent;color:var(--text-md);cursor:pointer;transition:all .12s;}
.ck-def-btn{border-right:1px solid var(--border);}
.ck-def-btn:hover,.ck-prin-btn:hover{background:var(--surface2);}
.ck-def-btn.open{color:var(--accent);background:color-mix(in srgb,var(--accent) 10%,transparent);}
.ck-prin-btn.open{color:var(--cc);background:color-mix(in srgb,var(--cc) 10%,transparent);}
.ck-panel{display:none;padding:13px;border-top:1px solid var(--border);background:var(--surface2);}
.ck-panel.open{display:block;}
.def-item{margin-bottom:11px;}.def-item:last-child{margin-bottom:0;}
.def-term{font-size:12.5px;font-weight:700;color:var(--text);margin-bottom:3px;}
.def-desc{font-size:12.5px;color:var(--text-md);line-height:1.55;}
/* 원리 설명 */
.prin-flow{display:flex;flex-wrap:wrap;align-items:center;gap:6px;margin-bottom:12px;padding-bottom:12px;border-bottom:1px dashed var(--border);}
.pf-step{font-family:var(--sans);font-size:11.5px;font-weight:700;background:color-mix(in srgb,var(--cc) 13%,transparent);color:var(--cc);border-radius:7px;padding:5px 10px;}
.pf-arr{color:var(--text-dim);font-weight:700;font-size:12px;}
.prin-line{font-size:13px;color:var(--text-md);line-height:1.7;margin-bottom:8px;padding-left:14px;position:relative;}
.prin-line:last-child{margin-bottom:0;}
.prin-line::before{content:'•';position:absolute;left:2px;color:var(--cc);font-weight:700;}
.prin-line em{font-style:normal;font-weight:700;color:var(--text);}

/* 용어 정의 (사전식, 한눈에) */
.gloss-item{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid color-mix(in srgb,var(--border) 55%,transparent);}
.gloss-item:first-child{padding-top:0;}
.gloss-item:last-child{border-bottom:none;padding-bottom:0;}
.gloss-term{flex:0 0 90px;font-size:12.5px;font-weight:800;color:var(--cc);line-height:1.45;}
.gloss-def{flex:1;font-size:12.5px;color:var(--text-md);line-height:1.5;}


/* ── 이전 / 셔플 / 다음 ── */
.nav-row{position:fixed;bottom:0;left:0;right:0;max-width:480px;margin:0 auto;display:flex;gap:8px;padding:10px 10px calc(10px + env(safe-area-inset-bottom));background:var(--surface);border-top:1px solid var(--border);box-shadow:0 -3px 14px rgba(0,0,0,.05);z-index:25;}
.btn-nav{flex:1;font-family:var(--sans);font-size:14px;font-weight:700;padding:12px;border:1.5px solid var(--border);border-radius:10px;background:var(--surface);color:var(--text);cursor:pointer;transition:all .13s;}
.btn-nav:hover:not(:disabled){border-color:var(--accent);color:var(--accent);}
.btn-nav:disabled{opacity:.3;cursor:not-allowed;}
.btn-shuffle{flex:0 0 auto;width:50px;font-size:17px;border:1.5px solid var(--border);border-radius:10px;background:var(--surface);color:var(--text);cursor:pointer;transition:all .13s;}
.btn-shuffle:hover{border-color:var(--gul);background:color-mix(in srgb,var(--gul) 10%,transparent);}
.btn-shuffle:active{transform:rotate(180deg);}
.card-empty{padding:30px 20px;text-align:center;color:var(--text-dim);font-size:13px;}

/* ── 모달 ── */
.modal-overlay{display:none;position:fixed;inset:0;background:#0008;z-index:100;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal-box{background:var(--surface);border-radius:14px;border:1px solid var(--border);padding:20px 18px 16px;width:280px;box-shadow:0 20px 50px #0003;}
.report-box{width:min(92vw,520px);max-height:82vh;display:flex;flex-direction:column;padding:18px 16px 14px;}
.report-body{overflow-y:auto;-webkit-overflow-scrolling:touch;font-size:12.5px;line-height:1.55;color:var(--text);margin:8px 0 12px;text-align:left;}
.report-body h4{font-size:13px;margin:13px 0 5px;color:var(--accent);}
.report-body ul{margin:4px 0 9px;padding-left:17px;}
.report-body li{margin:4px 0;}
.report-body b{font-weight:600;}
/* ── 모의시험 시뮬레이터 ── */
.sim-box{width:min(97vw,680px);max-height:92vh;display:flex;flex-direction:column;padding:16px 14px 12px;}
.sim-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.sim-new-btn{font-size:12px;padding:4px 12px;border:1px solid var(--border);border-radius:6px;background:none;color:var(--text);cursor:pointer;font-weight:500;}
.sim-new-btn:hover{background:var(--surface2);}
.sim-hint{font-size:11px;opacity:.6;margin:0 0 10px;}
.sim-scroll{overflow-y:auto;flex:1;}
.sim-section{margin-bottom:10px;}
.sim-section-label{font-size:11.5px;font-weight:700;color:var(--accent);margin-bottom:7px;padding:3px 8px;background:color-mix(in srgb,var(--accent) 10%,transparent);border-radius:5px;display:inline-block;}
.sim-cards{display:grid;gap:8px;}
.sim-cards.col2{grid-template-columns:1fr 1fr;}
.sim-cards.col3{grid-template-columns:1fr 1fr 1fr;}
@media(max-width:540px){.sim-cards.col2,.sim-cards.col3{grid-template-columns:1fr;}}
.sim-qcard{background:var(--surface2);border-radius:10px;padding:10px 12px;border:1px solid var(--border);cursor:pointer;user-select:none;transition:background .12s;}
.sim-qcard:active{background:color-mix(in srgb,var(--border) 60%,var(--surface2));}
.sim-qcard-head{font-size:10px;font-weight:700;color:var(--text);opacity:.55;margin-bottom:5px;display:flex;justify-content:space-between;align-items:center;}
.sim-arr{font-size:9px;opacity:.4;flex-shrink:0;transition:opacity .12s;}
.sim-qcard-q{font-size:12.5px;font-weight:500;color:var(--text);line-height:1.45;margin-bottom:8px;}
.sim-answer{display:none;margin-top:8px;font-size:11.5px;line-height:1.55;color:var(--text);padding:8px 10px;background:var(--bg);border-radius:7px;white-space:pre-wrap;}
.sim-answer.open{display:block;}
.sim-tip{font-size:10.5px;opacity:.65;margin-top:6px;padding:4px 8px;border-left:2px solid var(--accent);}
.modal-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:14px;}
.modal-input{width:100%;font-family:var(--mono);font-size:13px;padding:9px 11px;border:1.5px solid var(--border);border-radius:8px;background:var(--surface2);color:var(--text);margin-bottom:12px;outline:none;transition:border-color .12s;}
.modal-input:focus{border-color:var(--accent);}
.modal-btns{display:flex;gap:8px;}
.modal-btn-ok{flex:1;font-family:var(--sans);font-size:12px;font-weight:700;padding:8px;border:none;border-radius:8px;background:var(--accent);color:#fff;cursor:pointer;}
.modal-btn-cancel{font-family:var(--sans);font-size:12px;font-weight:500;padding:8px 14px;border:1.5px solid var(--border);border-radius:8px;background:transparent;color:var(--text-md);cursor:pointer;}

/* ── 오답노트 ── */
#cardModeOverlay{display:none;position:fixed;inset:0;background:var(--bg);z-index:45;overflow-y:auto;max-width:480px;margin:0 auto;}
.cm-hdr{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;}
.cm-back{font-size:12px;padding:6px 11px;border:1px solid var(--border);border-radius:7px;background:var(--surface2);color:var(--text-md);cursor:pointer;}
.cm-title{font-size:14px;font-weight:700;color:var(--text);flex:1;}
.cm-card-list{padding:10px 12px 40px;display:flex;flex-direction:column;gap:8px;}
.cm-card-item{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:13px;}
.cm-card-q{font-size:14px;font-weight:700;color:var(--text);margin-bottom:7px;line-height:1.4;}
.cm-card-a{font-size:12px;color:var(--text-md);line-height:1.55;}
.cm-empty{padding:40px 20px;text-align:center;color:var(--text-dim);font-size:14px;line-height:1.8;}

@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
#card{animation:fadeUp .18s ease;}

/* ── 구형 브라우저(color-mix 미지원) 폴백 ── */
@supports not (background: color-mix(in srgb, red, blue)){
  .ci.open{background:var(--surface2);}
  .ck-q-hint{border-color:var(--accent);}
  #card.allopen .ck-q-hint{background:var(--surface2);}
  .ck-def-btn.open,.ck-prin-btn.open{background:var(--surface2);}
  .pf-step{background:var(--surface2);color:var(--accent);}
  .gloss-item{border-bottom-color:var(--border);}
  .btn-flt:hover,.btn-sub:hover,.btn-nav:hover:not(:disabled){background:var(--surface2);}
  .dday-badge{box-shadow:0 2px 10px rgba(0,0,0,.18);}
  .ck-timer-btn.running{background:var(--surface2);}
  .prog-subject{border-left-color:var(--accent);}
}

@media (max-width:360px){
  .btn-flt{padding:5px 9px;}
  .btn-wrong{padding:5px 7px;}
  .filter-bar{padding-left:8px;padding-right:8px;}
  .ck-q-txt{font-size:15px;}
  .prog-subject{font-size:13.5px;}
  .topbar{padding-left:10px;padding-right:10px;}
}

//  메인 플래시카드 (구술/실기 통합 카드)
// ════════════════════════════════════════
let filterMode = '전체';
let filterSub  = 'all';
let filteredCards = [...ALL_CARDS];
let currentIndex = 0;
let blurOn = false;
let timerSec = 30, timerInt = null, timerActive = false;
let wrongSet = new Set(JSON.parse(localStorage.getItem('bbWrong') || '[]'));
let examDateStr = localStorage.getItem('examDate') || '2026-06-27';
let itemLayout = localStorage.getItem('bbLayout') || 'accordion';
const SUBS_GUL = ['운동생리학','스포츠영양학','기능해부학','트레이닝론','도핑방지','스포츠안전','스포츠인권','생활체육','IFBB'];
const SUBS_SIL = ['동작','IFBB'];

// ── 유형/과목 매핑 ──
function cardType(c){
  if(c.cat==='규정' && ['IFBB 종목','IFBB 복장','IFBB 규정'].includes(c.sub)) return '실기';
  if(c.cat==='트레이닝' && c.sub==='운동 동작') return '실기';
  return '구술';
}
function cardSubject(c){
  if(cardType(c)==='실기') return c.cat==='트레이닝' ? '동작' : 'IFBB';
  if(c.cat==='생리학') return '운동생리학';
  if(c.cat==='영양학') return '스포츠영양학';
  if(c.cat==='해부학') return '기능해부학';
  if(c.cat==='트레이닝') return '트레이닝론';
  if(c.cat==='규정'){
    if(c.sub==='도핑관리') return '도핑방지';
    if(c.sub==='응급처치') return '스포츠안전';
    if(c.sub.indexOf('윤리')>=0) return '스포츠인권';
    if(c.sub==='생활체육') return '생활체육';
  }
  return c.cat;
}
function extractKw(t){
  const m = t.match(/<em>(.*?)<\/em>/);
  if(m) return m[1];
  let plain = t.replace(/<[^>]+>/g,'').trim();
  let kw = plain.split(/[—:→·]/)[0].trim();
  if(kw.length>22) kw = kw.slice(0,20)+'…';
  return kw || plain.slice(0,20);
}
function extractLabel(t){
  const em = t.match(/<em>(.*?)<\/em>/);
  let s = em ? em[1].replace(/<[^>]+>/g,'') : '';
  if(!s){
    let p = t.replace(/<[^>]+>/g,'').trim();
    p = p.replace(/^[^:：]+[：:]\s*/,'');
    s = p.split(/[—:→·,]/)[0].trim();
  }
  s = s.replace(/\s*\([^)]*\)/g,'').trim();
  const w = s.split(/\s+/).filter(Boolean);
  for(const word of w){ if(!/적인$|스러운$|적$/.test(word)) return word; }
  return w[0]||'—';
}

// ── 필터 ──
function setFilterMode(mode, el){
  filterMode = mode; filterSub = 'all';
  document.querySelectorAll('.filter-main .btn-flt').forEach(b=>b.classList.remove('act'));
  el.classList.add('act');
  buildSubFilter(); applyFilter();
}
function buildSubFilter(){
  const row = document.getElementById('subFilterRow');
  let subs = null;
  if(filterMode==='구술') subs = SUBS_GUL;
  else if(filterMode==='실기') subs = SUBS_SIL;
  if(!subs){ row.innerHTML=''; return; }
  row.innerHTML = `<button class="btn-sub act" onclick="setSubFilter('all',this)">전체</button>` +
    subs.map(s=>`<button class="btn-sub" onclick="setSubFilter('${s}',this)">${s}</button>`).join('');
}
function setSubFilter(sub, el){
  filterSub = sub;
  document.querySelectorAll('#subFilterRow .btn-sub').forEach(b=>b.classList.remove('act'));
  el.classList.add('act');
  applyFilter();
}
function applyFilter(){
  if(filterMode==='복습'){ filteredCards = ALL_CARDS.filter(isDueOrNew); currentIndex=0; blurOn=false; resetTimer(); render(); return; }
  filteredCards = ALL_CARDS.filter(c=>{
    const _ifbb = c.cat==='규정' && ['IFBB 종목','IFBB 복장','IFBB 규정'].includes(c.sub);
    if(filterMode!=='전체' && cardType(c)!==filterMode && !_ifbb) return false;
    if(filterSub!=='all'   && cardSubject(c)!==filterSub) return false;
    return true;
  });
  currentIndex = 0; blurOn = false; resetTimer(); render();
}

// ── 렌더 ──
function render(){
  const total = filteredCards.length;
  const fill  = document.getElementById('progressFill');
  const ptxt  = document.getElementById('progressText');
  const psub  = document.getElementById('progSubject');
  const pstar = document.getElementById('progStars');
  const cardEl= document.getElementById('card');

  if(!total){
    cardEl.innerHTML = `<div class="card-empty">해당 카드가 없습니다.</div>`;
    if(fill) fill.style.width='0%';
    if(ptxt) ptxt.textContent='0 / 0';
    if(psub){ psub.textContent = filterSub!=='all' ? filterSub : filterMode; psub.style.borderLeftColor='var(--accent)'; }
    if(pstar) pstar.textContent='';
    document.getElementById('prevBtn').disabled=true;
    document.getElementById('nextBtn').disabled=true;
    return;
  }

  const card  = filteredCards[currentIndex];
  const color = CAT_COLORS[card.cat] || '#4f5de8';

  if(fill){ fill.style.width = `${((currentIndex+1)/total)*100}%`; fill.style.background=color; }
  if(ptxt) ptxt.textContent = `${currentIndex+1} / ${total}`;
  if(psub){ psub.innerHTML = `<span class="ps-cat" style="color:${color}">${card.cat}</span><span class="ps-sub">(${card.sub})</span>`; psub.style.borderLeftColor = color; }
  if(pstar) pstar.textContent = card.freq ? '★'.repeat(card.freq) : '';
  document.getElementById('prevBtn').disabled = currentIndex===0;
  document.getElementById('nextBtn').disabled = currentIndex===total-1;

  const w = wrongSet.has(card.q);

  // 답안 항목 HTML 빌드
  const grid = buildItemsHtml(card);

  const gloss = (typeof GLOSSARY!=='undefined') ? GLOSSARY[card.q] : null;
  const hasGloss = gloss && gloss.length;
  const glossHtml = hasGloss ? gloss.map(g=>`<div class="gloss-item"><span class="gloss-term">${g.t}</span><span class="gloss-def">${g.d}</span></div>`).join('') : '';
  const hasPrin = (card.extra && card.extra.trim()) || (card.flow && card.flow.length);
  const prinHtml = buildPrinciple(card);

  cardEl.style.setProperty('--cc', color);
  cardEl.className = [blurOn?'blind':'', itemLayout==='grid'?'grid-mode':''].filter(Boolean).join(' ');
  cardEl.innerHTML = `
    <div class="ck-q" onclick="revealAll()">
      <span class="ck-q-txt">${card.q}</span>
      <span class="ck-q-hint">전체공개</span>
    </div>
    <div class="ck-ctrl">
      <button class="ck-blind-btn${blurOn?' on':''}" onclick="toggleBlind();event.stopPropagation();">${blurOn?'🫣 가리는 중':'👁 답 가리기'}</button>
      <button class="ck-blind-btn${w?' on':''}" onclick="toggleWrong();event.stopPropagation();" style="${w?'border-color:#f43f5e;color:#f43f5e;background:color-mix(in srgb,#f43f5e 13%,transparent);':''}">${w?'❌ 오답됨':'❌ 오답'}</button>
      <button class="ck-timer-btn" id="timerBtn" onclick="startTimer();event.stopPropagation();">⏱ 30초</button>
      <button class="ck-layout-btn${itemLayout==='grid'?' active':''}" id="layoutBtn" onclick="toggleItemLayout();event.stopPropagation();">${itemLayout==='grid'?'☰ 목록':'⊞ 그리드'}</button>
    </div>
    <div class="ck-summary">
      <span class="ck-sum-lbl">요약</span>
      <span class="ck-sum-txt">${card.summary}</span>
    </div>
    <div class="ck-grid">${grid}</div>
    <div class="ci-detail" id="ciDetail"></div>
    ${(hasGloss||hasPrin)?`
    <div class="ck-bottom">
      <div class="ck-bottom-row">
        ${hasGloss?`<button class="ck-def-btn" id="defBtn" onclick="toggleDefPanel()"${hasPrin?'':' style="border-right:none;"'}>용어 정의 ▼</button>`:''}
        ${hasPrin?`<button class="ck-prin-btn" id="prinBtn" onclick="togglePrinPanel()"${hasGloss?'':' style="border-right:none;"'}>원리 설명 ▼</button>`:''}
      </div>
      ${hasGloss?`<div class="ck-panel" id="defPanel">${glossHtml}</div>`:''}
      ${hasPrin?`<div class="ck-panel" id="prinPanel">${prinHtml}</div>`:''}
    </div>`:''}
  `;
  injectSrsBar(card);
  cardEl.style.animation='none'; cardEl.offsetHeight; cardEl.style.animation='';
}

// ── 답안 항목 HTML 빌더 ──
function buildItemsHtml(card){
  const tot = card.items.length;
  return card.items.map((it,idx)=>{
    const kw = extractKw(it.t);
    const lbl = it.n;
    const span = (tot%2===1 && idx===tot-1) ? ' span2' : '';
    return `<div class="ci${span}" onclick="tapItem(${idx})"><div class="ci-head"><span class="ci-n">${it.n}</span><span class="ci-label">${lbl}</span><span class="ci-kw">${kw}</span><span class="ci-chev">▾</span></div><div class="ci-full">${it.t}</div></div>`;
  }).join('');
}

// ── 레이아웃 전환 (아코디언 ↔ 그리드) ──
function toggleItemLayout(){
  itemLayout = itemLayout==='accordion' ? 'grid' : 'accordion';
  localStorage.setItem('bbLayout', itemLayout);
  const c=document.getElementById('card');
  c.classList.toggle('grid-mode', itemLayout==='grid');
  c.classList.remove('allopen');
  c.querySelectorAll('.ci').forEach(e=>e.classList.remove('open'));
  const det=c.querySelector('.ci-detail');
  if(det){det.classList.remove('show');det.innerHTML='';}
  const s=c.querySelector('.ck-summary');if(s)s.classList.remove('show');
  const btn=document.getElementById('layoutBtn');
  if(btn){btn.classList.toggle('active',itemLayout==='grid');btn.textContent=itemLayout==='grid'?'☰ 목록':'⊞ 그리드';}
}

// ── 원리 설명 구성 (기존 데이터만 사용, 가독성 정리) ──
function buildPrinciple(card){
  let html = '';
  if(card.flow && card.flow.length){
    html += '<div class="prin-flow">' + card.flow.map(f=>
      f==='→' ? '<span class="pf-arr">→</span>' : `<span class="pf-step">${f}</span>`
    ).join('') + '</div>';
  }
  if(card.extra && card.extra.trim()){
    const lines = card.extra
      .split(/\n+/).join(' ')
      .split(/(?<=[.。])\s+/)
      .map(s=>s.trim()).filter(Boolean);
    html += lines.map(s=>`<div class="prin-line">${s}</div>`).join('');
  }
  return html;
}

// ── 카드 상호작용 ──
function tapItem(idx){
  const c=document.getElementById('card');
  if(itemLayout==='grid'){
    const cells=c.querySelectorAll('.ci');
    const det=c.querySelector('.ci-detail');
    if(!det)return;
    const was=cells[idx]&&cells[idx].classList.contains('open');
    cells.forEach(e=>e.classList.remove('open'));
    if(was){det.classList.remove('show');det.innerHTML='';}
    else if(cells[idx]){
      cells[idx].classList.add('open');
      det.innerHTML=cells[idx].querySelector('.ci-full')?.innerHTML||'';
      det.classList.add('show');
    }
  } else {
    const ci=c.querySelectorAll('.ci')[idx];
    if(ci) ci.classList.toggle('open');
  }
}
function revealAll(){
  const c=document.getElementById('card');
  const on=c.classList.toggle('allopen');
  const cells=c.querySelectorAll('.ci');
  cells.forEach(e=>e.classList.toggle('open',on));
  if(itemLayout==='grid'){
    const det=c.querySelector('.ci-detail');
    if(det){
      if(on){
        let h='';
        cells.forEach((cell,i)=>{
          const kw=cell.querySelector('.ci-kw')?.textContent||'';
          const full=cell.querySelector('.ci-full')?.innerHTML||'';
          const sep=i<cells.length-1?'border-bottom:1px solid var(--border);padding-bottom:10px;margin-bottom:10px;':'';
          h+=`<div style="${sep}"><strong style="color:var(--cc)">${kw}</strong><br><span style="font-size:13px;color:var(--text-md)">${full}</span></div>`;
        });
        det.innerHTML=h; det.classList.add('show');
      } else {det.innerHTML='';det.classList.remove('show');}
    }
  }
  const s=c.querySelector('.ck-summary');
  if(s) s.classList.toggle('show',on);
}
function toggleBlind(){
  blurOn=!blurOn;
  const c=document.getElementById('card');
  c.classList.toggle('blind',blurOn);
  const b=c.querySelector('.ck-blind-btn');
  if(b){b.classList.toggle('on',blurOn);b.textContent=blurOn?'🫣 가리는 중':'👁 답 가리기';}
  if(blurOn){
    c.classList.remove('allopen');
    c.querySelectorAll('.ci').forEach(e=>e.classList.remove('open'));
    const det=c.querySelector('.ci-detail');
    if(det){det.classList.remove('show');det.innerHTML='';}
    const s=c.querySelector('.ck-summary');if(s)s.classList.remove('show');
  }
}
function toggleDefPanel(){
  document.getElementById('defBtn').classList.toggle('open');
  document.getElementById('defPanel').classList.toggle('open');
}
function togglePrinPanel(){
  document.getElementById('prinBtn').classList.toggle('open');
  document.getElementById('prinPanel').classList.toggle('open');
}

// ── 타이머 ──
function startTimer(){
  const b=document.getElementById('timerBtn'); if(!b)return;
  if(timerActive){ resetTimer(); return; }
  timerActive=true; timerSec=30; b.classList.add('running'); updateTimerBtn();
  timerInt=setInterval(()=>{ timerSec--; updateTimerBtn(); if(timerSec<=0) resetTimer(); },1000);
}
function updateTimerBtn(){
  const b=document.getElementById('timerBtn'); if(!b)return;
  b.textContent = timerActive ? `⏱ ${timerSec}초` : '⏱ 30초';
}
function resetTimer(){
  clearInterval(timerInt); timerActive=false; timerSec=30;
  const b=document.getElementById('timerBtn');
  if(b){ b.classList.remove('running'); b.textContent='⏱ 30초'; }
}

// ── 이동 ──
function move(dir){
  if(!filteredCards.length) return;
  currentIndex = Math.max(0, Math.min(filteredCards.length-1, currentIndex+dir));
  resetTimer(); render();
}
function shuffle(){
  if(!filteredCards.length) return;
  for(let i=filteredCards.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [filteredCards[i],filteredCards[j]]=[filteredCards[j],filteredCards[i]];
  }
  currentIndex=0; resetTimer(); render();
}

function toggleTheme(){
  const dark = document.documentElement.classList.toggle('dark');
  const t=document.getElementById('themeBtn'); if(t)t.textContent = dark?'☀️':'🌙';
  localStorage.setItem('theme', dark?'dark':'light');
}

// ── 검색 ──
function openSearch(){
  document.getElementById('searchOverlay').classList.add('open');
  setTimeout(()=>{const inp=document.getElementById('searchInput'); if(inp) inp.focus();},80);
  doSearch('');
}
function closeSearch(){
  document.getElementById('searchOverlay').classList.remove('open');
  const inp=document.getElementById('searchInput'); if(inp) inp.value='';
  const res=document.getElementById('searchResults'); if(res) res.innerHTML='<div class="search-no-result">검색어를 입력하세요</div>';
}
function closeSearchOverlay(e){ if(e.target.id==='searchOverlay') closeSearch(); }
function doSearch(q){
  const res=document.getElementById('searchResults'); if(!res) return;
  q=(q||'').trim().toLowerCase();
  if(!q){ res.innerHTML='<div class="search-no-result">검색어를 입력하세요</div>'; return; }
  const hits=ALL_CARDS.filter(c=>{
    const text=[c.q, c.summary||'', (c.keywords||[]).join(' '),
      (c.items||[]).map(i=>(i.t||'').replace(/<[^>]+>/g,'')).join(' '),
      c.extra||''].join(' ').toLowerCase();
    return text.includes(q);
  }).slice(0,30);
  if(!hits.length){ res.innerHTML='<div class="search-no-result">일치하는 카드가 없습니다</div>'; return; }
  res.innerHTML=hits.map(c=>{
    const idx=ALL_CARDS.indexOf(c);
    const subj=cardSubject(c);
    const kws=(c.keywords||[]).slice(0,4).join(' · ');
    return '<div class="search-result-item" onclick="jumpToSearchCard('+idx+')">'
      +'<span class="sr-badge">'+subj+'</span>'
      +'<div class="sr-q">'+c.q+'</div>'
      +(kws?'<div class="sr-kw">'+kws+'</div>':'')
      +'</div>';
  }).join('');
}
function jumpToSearchCard(globalIdx){
  closeSearch();
  // 필터 UI 초기화
  filterMode='전체'; filterSub='all';
  document.querySelectorAll('.filter-main .btn-flt').forEach(b=>b.classList.remove('act'));
  const allBtn=document.querySelector('.filter-main .btn-flt[data-mode="전체"]');
  if(allBtn) allBtn.classList.add('act');
  buildSubFilter();
  // applyFilter() 대신 직접 재계산 — applyFilter는 currentIndex=0 리셋 후 render()를 먼저 호출해버리므로
  filteredCards = ALL_CARDS.slice();
  const pos = filteredCards.indexOf(ALL_CARDS[globalIdx]);
  currentIndex = pos >= 0 ? pos : 0;
  blurOn = false; resetTimer();
  render();
  window.scrollTo({top:0, behavior:'smooth'});
}

function updateDday(){
  const e=document.getElementById('ddayBadge'); if(!e)return;
  const today=new Date(); today.setHours(0,0,0,0);
  const exam=new Date(examDateStr+'T00:00:00');
  const diff=Math.round((exam-today)/86400000);
  e.textContent = diff>0 ? `D-${diff}` : (diff===0 ? 'D-DAY' : `D+${-diff}`);
}
function openDdayEdit(){
  document.getElementById('ddayInput').value = examDateStr;
  document.getElementById('ddayModal').classList.add('open');
}
function closeDdayEdit(){ document.getElementById('ddayModal').classList.remove('open'); }
function openSim(){ drawSimSet(); document.getElementById('simModal').classList.add('open'); }
function closeSim(){ document.getElementById('simModal').classList.remove('open'); }
function drawSimSet(){
  const s3=SECTION_QUESTIONS[3];
  function byG(kws){ return s3.filter(q=>kws.some(k=>q.group.includes(k))); }
  function pick(arr,n){ const a=[...arr]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a.slice(0,n); }
  const guReg=byG(['경기규정','도핑','안전','응급','생활체육','인권']);
  const guJid=byG(['해부학','트레이닝','영양학','생리학']);
  const bodyGroups=['하체','등','가슴','어깨','팔','복부'];
  const pickedBG=[...bodyGroups].sort(()=>Math.random()-.5).slice(0,3);
  const silDon=pickedBG.map(g=>{ const p=byG([g]); return pick(p,1)[0]; }).filter(Boolean);
  const silApp=pick(byG(['세트 운동']),1);
  const silPoz=pick(byG(['포징']),1);
  function card(q,label){
    if(!q) return '';
    const ans=(q.answer||'').replace(/`/g,'').trim();
    const tip=(q.tip||'').replace(/`/g,'').trim();
    return '<div class="sim-qcard" onclick="var a=this.querySelector(\x27.sim-answer\x27);a.classList.toggle(\x27open\x27);this.querySelector(\x27.sim-arr\x27).textContent=a.classList.contains(\x27open\x27)?\x27▲\x27:\x27▼\x27">'
      +'<div class="sim-qcard-head"><span>'+label+'</span><span class="sim-arr">▼</span></div>'
      +'<div class="sim-qcard-q">'+(q.q||'')+'</div>'
      +'<div class="sim-answer">'+(ans||'—')+(tip?'<div class="sim-tip">💡 '+tip+'</div>':'')+'</div>'
      +'</div>';
  }
  const sections=[
    {lbl:'📚 구술 · 규정',    cards:pick(guReg,2), lbls:['규정①','규정②'],        cls:'col2'},
    {lbl:'📚 구술 · 지도방법', cards:pick(guJid,2), lbls:['지도①','지도②'],       cls:'col2'},
    {lbl:'🏋️ 실기 · 동작',    cards:silDon,        lbls:['동작①','동작②','동작③'],cls:'col3'},
    {lbl:'🏋️ 실기 · 응용',    cards:silApp,        lbls:['응용①'],                cls:'col2'},
    {lbl:'💃 실기 · 포징',     cards:silPoz,        lbls:['포징①'],                cls:'col2'},
  ];
  document.getElementById('simBody').innerHTML=sections.map(sec=>
    '<div class="sim-section"><span class="sim-section-label">'+sec.lbl+'</span>'
    +'<div class="sim-cards '+sec.cls+'">'+sec.cards.map((q,i)=>card(q,sec.lbls[i]||'')).join('')+'</div></div>'
  ).join('');
}
function saveDday(){
  const v=document.getElementById('ddayInput').value;
  if(v){ examDateStr=v; localStorage.setItem('examDate',v); updateDday(); }
  closeDdayEdit();
}

const _DAY = 86400000;
function _todayEpoch(){ return Math.floor(Date.now()/_DAY); }
function _todayStr(){ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function _ydayStr(){ const d=new Date(Date.now()-_DAY); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }

let srsMap = (function(){ try{ return JSON.parse(localStorage.getItem('bbSrs')||'{}'); }catch(e){ return {}; } })();
function saveSrs(){ localStorage.setItem('bbSrs', JSON.stringify(srsMap)); }
function srsUpdate(q, quality){
  let r = srsMap[q] || { interval:0, ease:2.5, reps:0 };
  if(quality < 3){ r.reps=0; r.interval=0; }
  else {
    if(r.reps===0) r.interval = (quality===5?3:1);
    else if(r.reps===1) r.interval = (quality===5?10:6);
    else { const k=(quality===3?0.85:quality===5?1.3:1); r.interval=Math.max(1,Math.round(r.interval*r.ease*k)); }
    r.ease = Math.max(1.3, r.ease + (0.1-(5-quality)*(0.08+(5-quality)*0.02)));
    r.reps += 1;
  }
  r.due = _todayEpoch()+r.interval; r.last=_todayEpoch();
  srsMap[q]=r; saveSrs(); return r;
}
function srsStatus(q){
  const r=srsMap[q];
  if(!r) return {label:'새 카드', cls:'new'};
  const d=r.due-_todayEpoch();
  if(d<=0) return {label:'복습 대상', cls:'due'};
  return {label:d+'일 뒤', cls:'sched'};
}
function isDueOrNew(c){ const r=srsMap[c.q]; if(!r) return true; return r.due<=_todayEpoch(); }
function reviewCount(){ return ALL_CARDS.filter(isDueOrNew).length; }

let game = Object.assign({xp:0,streak:0,maxStreak:0,reps:0,last:null}, (function(){ try{ return JSON.parse(localStorage.getItem('bbGame')||'{}'); }catch(e){ return {}; } })());
function saveGame(){ localStorage.setItem('bbGame', JSON.stringify(game)); }
function gameLevel(){ return Math.floor(game.xp/100)+1; }
function gameAward(){
  game.xp+=10; game.reps=(game.reps||0)+1;
  const t=_todayStr();
  if(game.last!==t){ game.streak = (game.last===_ydayStr()) ? (game.streak||0)+1 : 1; game.last=t; }
  game.maxStreak=Math.max(game.maxStreak||0, game.streak);
  saveGame(); updateGameBar();
}
function gameBadges(){
  const lv=gameLevel(), ms=game.maxStreak||0, rp=game.reps||0;
  return [
    {n:'첫 평가', ic:'🎯', on:rp>=1},
    {n:'카드 100', ic:'💯', on:rp>=100},
    {n:'Lv.5 달성', ic:'⭐', on:lv>=5},
    {n:'7일 연속', ic:'🔥', on:ms>=7},
    {n:'30일 연속', ic:'🏆', on:ms>=30},
    {n:'복습 클리어', ic:'✅', on:(reviewCount()===0 && rp>=1)},
  ];
}

function rateCard(quality){
  const card = filteredCards[currentIndex]; if(!card) return;
  const r = srsUpdate(card.q, quality);
  gameAward(); updateReviewBadge();
  const bar = document.querySelector('#card .srs-bar');
  if(bar){
    const dd = r.due-_todayEpoch();
    const msg = (quality===0||dd<=0) ? '오늘 다시 등장' : (dd+'일 뒤 복습');
    bar.innerHTML = '<div class="srs-done">✓ 예약됨 — <b>'+msg+'</b> · +10 XP</div>';
  }
  if(filterMode==='복습' && currentIndex < filteredCards.length-1){ setTimeout(function(){ move(1); }, 480); }
}
function injectSrsBar(card){
  const c=document.getElementById('card'); if(!c||!card) return;
  const hasSoc=(typeof SOCRATIC!=='undefined') && SOCRATIC[card.q] && SOCRATIC[card.q].length;

    (hasSoc?'<div class="st-panel" id="socPanel">'+socraticPanelHtml(card)+'</div>':'');
  const st=srsStatus(card.q);

    '<span class="srs-stat '+st.cls+'">'+st.label+'</span></div>'+
    '<div class="srs-btns">'+
      '<button class="srs-b again" onclick="rateCard(0)">다시</button>'+
      '<button class="srs-b hard" onclick="rateCard(3)">어려움</button>'+
      '<button class="srs-b good" onclick="rateCard(4)">보통</button>'+
      '<button class="srs-b easy" onclick="rateCard(5)">쉬움</button>'+
    '</div></div>';
  c.insertAdjacentHTML('beforeend', tools+html);
}

function updateGameBar(){
  const lv=document.getElementById('gbLv'); if(lv) lv.textContent=gameLevel();
  const xp=document.getElementById('gbXp'); if(xp) xp.style.width=(game.xp%100)+'%';

function updateReviewBadge(){

}
function openStats(){
  const m=document.getElementById('statsModal'); if(!m) return;

  body.innerHTML='<div class="stats-grid">'+cells.map(function(c){return '<div class="stat-cell"><div class="v">'+c[0]+'</div><div class="l">'+c[1]+'</div></div>';}).join('')+

  m.classList.add('open');

  return '<div class="fey-prompt">이 개념을 <b>쉬운 말로</b> 설명해보세요 — 다 적고 점검하면 빠진 핵심을 짚어줍니다.</div>'+
    '<textarea class="fey-input" id="feyInput" rows="3" placeholder="친구에게 가르치듯 적어보세요…"></textarea>'+
    '<button class="fey-check" onclick="feynmanCheck()">설명 점검 ▸</button>'+
    '<div class="fey-result" id="feyResult"></div>';
}
function feynmanCheck(){
  const card=filteredCards[currentIndex]; if(!card) return;
  const el=document.getElementById('feyInput'); if(!el) return;
  const txt=el.value||'';
  const kws=(card.keywords||[]);
  if(!kws.length){ document.getElementById('feyResult').innerHTML='<div class="fey-msg">이 카드는 채점할 핵심 키워드가 없어요. 자유롭게 설명 연습만 해도 좋아요.</div>'; return; }
  let hit=0;
  const rows=kws.map(function(k){ const ok=txt.indexOf(k)>=0; if(ok)hit++; return '<div class="fey-row"><span class="'+(ok?'fy-ok':'fy-no')+'">'+(ok?'✓':'✗')+'</span> '+k+'</div>'; }).join('');
  const msg = hit===kws.length ? '완벽 — 핵심 개념을 빠짐없이 설명했어요!' : (kws.length+'개 핵심 중 <b>'+hit+'개</b> 포함. ✗가 당신의 빈틈입니다.');
  document.getElementById('feyResult').innerHTML='<div class="fey-msg">'+msg+'</div>'+rows;
}

let _socStep=0;
function socFlat(card){
  const chain=(typeof SOCRATIC!=='undefined' && SOCRATIC[card.q]) ? SOCRATIC[card.q] : [];
  const seq=[]; chain.forEach(function(p){ seq.push({t:'q',x:p.q}); seq.push({t:'a',x:p.a}); }); return seq;
}
function socraticPanelHtml(card){
  _socStep=0;
  return '<div class="soc-thread" id="socThread"></div><button class="soc-next" id="socNext" onclick="socraticNext()">🤔 첫 꼬리질문 ▸</button>';
}
function socPaint(seq){
  const th=document.getElementById('socThread'); if(!th) return;
  th.innerHTML=seq.slice(0,_socStep).map(function(s){ return '<div class="soc-bub '+(s.t==='q'?'soc-q':'soc-a')+'">'+(s.t==='q'?'🤔 ':'')+s.x+'</div>'; }).join('');
  const btn=document.getElementById('socNext'); if(!btn) return;
  if(_socStep>=seq.length){ btn.style.display='none'; return; }
  btn.style.display='';
  btn.textContent = _socStep===0 ? '🤔 첫 꼬리질문 ▸' : (seq[_socStep].t==='q' ? '다음 질문 ▸' : '답 보기 ▸');
}
function socraticNext(){
  const card=filteredCards[currentIndex]; if(!card) return;
  const seq=socFlat(card);
  if(_socStep<seq.length) _socStep++;
  socPaint(seq);
}
function toggleSocratic(){
  const p=document.getElementById('socPanel'); if(!p) return;
  p.classList.toggle('open');
  if(p.classList.contains('open')){ const card=filteredCards[currentIndex]; socPaint(socFlat(card)); }
}

      answer: `① 주동근(Agonist/Prime Mover)\n   → 동작의 주역할 담당 근육\n   → 예: 바벨컬에서 상완이두근\n\n② 길항근(Antagonist)\n   → 주동근과 반대 방향 작용 근육\n   → 주동근 수축 시 이완하여 부드러운 움직임 조절\n   → 예: 바벨컬에서 상완삼두근\n\n③ 협력근(Synergist)\n   → 주동근의 움직임을 보조하는 근육\n   → 예: 바벨컬에서 완요골근`,

    { group: '🏋️ 트레이닝·지도법 기출', q: '동화작용(Anabolism)과 이화작용(Catabolism)을 설명하시오',
      answer: `【동화작용(Anabolism)】 — 합성\n작은 분자 → 큰 분자로 만드는 합성 과정 (에너지 소비)\n• 예: 아미노산 → 근육 단백질 합성, 포도당 → 글리코겐 합성\n• 관련 호르몬: 성장호르몬, 인슐린, 테스토스테론\n\n【이화작용(Catabolism)】 — 분해\n큰 분자 → 작은 분자로 쪼개는 분해 과정 (에너지 방출)\n• 예: 글리코겐 → 포도당, 근육 → 아미노산(근손실)\n• 조건: 고강도 운동·영양 부족·스트레스 시 활성\n\n✔ 근비대 = 동화 > 이화 상태 유지가 목표`,

    { group: '★ 🧬 운동생리학 기출', q: '지연성 근육통(DOMS, Delayed Onset Muscle Soreness)이란?',

    { group: '★ 🧬 운동생리학 기출', q: '호흡교환율(RER, Respiratory Exchange Ratio)이란?',
      answer: `운동 중 이산화탄소 배출량(VCO₂)을 산소 소비량(VO₂)으로 나눈 값\n\nRER = VCO₂ / VO₂\n\n【의미】\n• RER = 0.7: 지방만 사용 (지방 연소 비율 높음)\n• RER = 1.0: 탄수화물만 사용\n• RER 0.7~1.0: 지방+탄수화물 혼합 사용\n• RER > 1.0: 고강도 무산소 운동 (젖산 축적으로 CO₂ 과잉 배출)\n\n✔ 운동 강도가 높아질수록 RER이 높아지며 탄수화물 비율↑`,

    { group: '★ 🧬 운동생리학 기출', q: '교감신경과 부교감신경의 차이를 설명하시오',

function loadSavedPatches() {
  try {
    const saved = localStorage.getItem('gulsulPatches');
    if (!saved) return;
    const patches = JSON.parse(saved);
    patches.forEach(p => applyPatch(p, false));
  } catch(e) {}
}

function applyPatch(patch, save=true) {
  try {
    if (patch.type === 'add' && patch.section >= 0) {
      const cards = patch.cards || [];
      // 중복 방지: 같은 q가 없을 때만 추가
      const existing = new Set(SECTION_QUESTIONS[patch.section].map(c => c.q));
      const toAdd = cards.filter(c => !existing.has(c.q));
      SECTION_QUESTIONS[patch.section].push(...toAdd);
    }
    if (patch.type === 'replace' && patch.section >= 0 && patch.index >= 0) {
      SECTION_QUESTIONS[patch.section][patch.index] = patch.card;
    }
    if (save) {
      const saved = JSON.parse(localStorage.getItem('gulsulPatches') || '[]');
      saved.push(patch);
      localStorage.setItem('gulsulPatches', JSON.stringify(saved));
      updateSectionCards();
    }
  } catch(e) { alert('패치 적용 오류: ' + e.message); }
}

function calcSectionStats(secIdx) {
  const qs = SECTION_QUESTIONS[secIdx];
  // 대학/장소 수
  const places = new Set(qs.map(q => q.univ || (secIdx === 2 ? '태릉' : '공통'))
    .filter(u => u && u !== '공통'));
  // 조 수 (팁에서 "N조" 패턴 추출)
  const sessions = new Set();
  qs.forEach(q => {
    const m = (q.tip||'').match(/[가-힣]*\s*\d+조/g);
    if (m) m.forEach(s => sessions.add((q.univ||'')+s));
  });
  // 신유형 수
  const newTypes = qs.filter(q =>
    (q.tip||'').includes('신유형') || (q.group||'').includes('신유형')
  ).length;
  return {
    placeCount: places.size || 1,
    places: [...places],
    sessionCount: sessions.size,
    newTypes
  };
}

function updateSectionCards() {
  SECTIONS.forEach(({ id, color }) => {
    const qs = SECTION_QUESTIONS[id];
    const total = qs.length;
    const ok    = checkedSets[id].size;
    const wrong = wrongSets[id].size;
    const done  = ok + wrong;
    document.getElementById(`sec${id}badge`).textContent = total + "문제";
    document.getElementById(`sec${id}bar`).style.width = total ? `${(done/total)*100}%` : '0%';
    document.getElementById(`sec${id}bar`).style.background = color;
    document.getElementById(`sec${id}stat`).textContent =
      total > 1 ? `✅ ${ok}  ❌ ${wrong}  남은 ${total-done}문제` : '';
  });

  // ── 섹션2 칩 ──────────────────────────────────────────────
  const s2 = calcSectionStats(2);
  const s2place = document.getElementById('sec2-chip-place');
  const s2sess  = document.getElementById('sec2-chip-sess');
  const s2new   = document.getElementById('sec2-chip-new');
  if (s2place) {
    const label = s2.placeCount === 1 ? `📍 ${s2.places[0]||'태릉'} 1곳` : `📍 ${s2.placeCount}개 장소`;
    s2place.textContent = label;
  }
  if (s2sess) {
    // 섹션2 팁엔 직접 조 번호 없음 → 116p 후기 기준 고정
    s2sess.textContent = '👥 50개+ 조 후기 (6/13~15)';
  }
  if (s2new) {
    s2new.textContent = s2.newTypes > 0 ? `✨ ${s2.newTypes}개 신유형` : '✨ 신규 출제유형';
    s2new.style.display = 'inline-flex';
  }

  // ── 섹션3 칩 ──────────────────────────────────────────────
  const s3 = calcSectionStats(3);
  const s3univ = document.getElementById('sec3-chip-univ');
  const s3sess = document.getElementById('sec3-chip-sess');
  const s3new  = document.getElementById('sec3-chip-new');
  if (s3univ) s3univ.textContent = `🏫 ${s3.placeCount}개 대학`;
  if (s3sess) {
    s3sess.textContent = s3.sessionCount > 0
      ? `👥 ${s3.sessionCount}개 조`
      : '👥 多수 조';
  }
  if (s3new) {
    if (s3.newTypes > 0) {
      s3new.textContent = `✨ ${s3.newTypes}개 신유형`;
      s3new.style.display = 'inline-flex';
    }
  }
}

function getSubjectForCard(q) {
  if (q.subj) return q.subj;

  const t = q.q || '';
  // 섹션2 그룹 이모지 기준
  if (g.includes('🚑')) return '스포츠 안전';
  if (g.includes('⚖️')) return '도핑 방지';
  if (g.includes('🧬')) return '운동생리학';
  if (g.includes('🦴')) return '기능해부학';
  if (g.includes('🥗')) return '스포츠 영양학';
  if (g.includes('🏋️')) {
    if (t.includes('생활체육')) return '생활체육';
    return '트레이닝론';
  }
  if (g.includes('🏆') || g.includes('포징')) return '경기 규정';
  if (g.includes('🤝')) return '스포츠 인권';
  if (g.includes('💚')) return '생활체육';
  if (g.includes('🔤')) return '기능해부학';
  if (g.includes('🔥')) {
    if (t.includes('인권') || t.includes('SNS') || t.includes('신체 접촉')) return '스포츠 인권';
    return '운동생리학';
  }
  // 섹션0·1 그룹 텍스트 기준
  if (g.includes('🔬')) return '운동생리학';
  if (g.includes('💊') || g.includes('보충제')) return '스포츠 영양학';
  if (g.includes('🏆 IFBB') || g.includes('⚖️ IFBB') || g.includes('IFBB 규정')) return '경기 규정';
  if (g.includes('🚫 도핑')) return '도핑 방지';
  // 섹션3 그룹 텍스트 기준
  if (g.includes('경기규정')) return '경기 규정';
  if (g.includes('스포츠안전') || g.includes('응급처치')) return '스포츠 안전';
  if (g.includes('해부학')) return '기능해부학';
  if (g.includes('트레이닝')) return '트레이닝론';
  if (g.includes('생활체육')) return '생활체육';
  if (g.includes('영양학')) return '스포츠 영양학';
  if (g.includes('도핑')) return '도핑 방지';
  if (g.includes('인권') || g.includes('윤리')) return '스포츠 인권';
  if (g.includes('생리학') || g.includes('운동생리')) return '운동생리학';
  return '기타';
}

function getCardType(q) {
  if (q.type) return q.type;
  const t = q.q || '';
  const g = q.group || '';
  // 실시·시행 요청 카드 → 실기
  if (t.includes('실시하시오') || t.includes('시행하시오') || t.includes('시연하시오') || t.includes('보여주세요')) return '실기';
  if (g.includes('트레이닝 실기') || (g.includes('실기·동작') && !t.includes('설명하시오') && !t.includes('차이점'))) return '실기';
  if (g.includes('포징 시연')) return '실기';
  return '구술';
}

function getCardStars(q) {
  if (q.freq) return Math.min(q.freq, 5);
  const m = (q.q || '').match(/^(★+)/);
  return m ? Math.min(m[1].length, 5) : 0;
}

  if (currentSection === 3) {
    const tip = q.tip || '';
    if (tip.match(/3[곳회]|다수|여러 조|최다/)) return 3;
    if (q.univ === '공통' && tip.includes('·')) return 3;
    if (tip.match(/2[회곳]/)) return 2;
    if (q.univ === '공통') return 2;
    return 1;
  }
  return 0;
}

function printSection() {
  const qs = getCurQuestions();
  const secName = SECTIONS[currentSection].name;
  const secColor = SECTIONS[currentSection].color;

  // 그룹별 정리
  const groups = {};
  qs.forEach((q) => {
    if (!groups[q.group]) groups[q.group] = [];
    groups[q.group].push(q);
  });

  let bodyHtml = '';
  for (const [group, items] of Object.entries(groups)) {
    bodyHtml += `<div class="ph-group">${group}</div>`;
    items.forEach((q, idx) => {
      const freq = getFreqForPrint(q);
      const stars = freq===3?'★★★':freq===2?'★★☆':freq===1?'★☆☆':'';
      const starCol = freq===3?'#e53e3e':freq===2?'#d97706':'#94a3b8';
      bodyHtml += `
        <div class="ph-card">
          <div class="ph-q">
            ${stars ? `<span style="color:${starCol};font-size:11px;font-weight:700;margin-right:6px;letter-spacing:0;">${stars}</span>` : ''}
            ${q.q}
          </div>
          <div class="ph-a">${q.answer.replace(/\n/g,'<br>')}</div>
          ${q.tip ? `<div class="ph-tip">💡 ${q.tip}</div>` : ''}
        </div>`;
    });
  }

  const printHTML = `<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>${secName} · 인쇄본</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'Noto Sans KR',sans-serif; font-size:11px; color:#111; background:#fff; padding:12mm 14mm; }
  h1 { font-size:16px; font-weight:700; margin-bottom:4px; color:#111; border-bottom:2px solid ${secColor}; padding-bottom:6px; }
  .meta { font-size:9px; color:#666; margin-bottom:10px; }
  .ph-group { font-size:9px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:#888; border-bottom:1px solid #ddd; padding:6px 0 3px; margin:10px 0 4px; }
  .ph-card { border:1px solid #e5e7eb; border-left:3px solid ${secColor}; padding:6px 8px; margin-bottom:5px; page-break-inside:avoid; background:#fafafa; }
  .ph-q { font-size:11px; font-weight:700; color:#111; margin-bottom:4px; line-height:1.4; }
  .ph-a { font-size:10px; color:#333; line-height:1.6; white-space:pre-wrap; }
  .ph-tip { font-size:9px; color:#666; margin-top:4px; padding:3px 6px; background:#f0f4ff; border-radius:3px; }
  .star-legend { font-size:9px; color:#666; margin-bottom:8px; display:flex; gap:12px; }
  .star-legend span { display:flex; align-items:center; gap:3px; }
  @media print {
    * { -webkit-print-color-adjust:exact !important; print-color-adjust:exact !important; }
    body { padding:8mm 10mm; }
    .ph-card { page-break-inside:avoid; }
    .ph-group { page-break-after:avoid; }
  }
</style>
</head>
<body>
<h1>${secName}</h1>
<div class="meta">생활스포츠지도사 2급 보디빌딩 · 구술카드 인쇄본 · 총 ${qs.length}문항</div>
<div class="star-legend">
  <span><span style="color:#e53e3e;font-weight:700;">★★★</span> 최빈출</span>
  <span><span style="color:#d97706;font-weight:700;">★★☆</span> 빈출</span>
  <span><span style="color:#94a3b8;font-weight:700;">★☆☆</span> 출제</span>
</div>
${bodyHtml}
</body></html>`;

  const w = window.open('', '_blank');
  if (!w) { alert('팝업이 차단되었습니다. 팝업 허용 후 다시 시도해주세요.'); return; }
  w.document.write(printHTML);
  w.document.close();
  setTimeout(() => w.print(), 600);
}

function closeExamMode() {
  document.getElementById('examOverlay').style.display = 'none';
  document.documentElement.style.removeProperty('--sec-color');
}

function examBack() {
  // handled by onclick on button
}

function renderExamCount() {
  const qs    = getCurQuestions();
  const total = qs.length;
  const ok    = getCurChecked().size;
  const wrong = getCurWrong().size;
  document.getElementById('examCount').textContent = `✅${ok} ❌${wrong} / ${total}`;
}

function setExamView(v) {
  examView = v;
  // 뷰 전부 숨기기 (버튼 행 제거됐으므로 btn 참조 생략)
  document.getElementById('examListView').style.display  = 'none';
  document.getElementById('examCardView').style.display  = 'none';
  document.getElementById('examWrongView').style.display = 'none';
  // const key = v.charAt(0).toUpperCase() + v.slice(1); // 버튼 행 제거됨
  if (v === 'list') {
    document.getElementById('examListView').style.display = 'block';
    renderExamList();
  } else if (v === 'card') {
    document.getElementById('examCardView').style.display = 'block';
    examQueue = [...getCurQuestions().keys()];
    examIdx = 0; renderExamCard();
  } else if (v === 'shuffle') {
    document.getElementById('examCardView').style.display = 'block';
    examQueue = [...getCurQuestions().keys()].sort(() => Math.random() - .5);
    examIdx = 0; renderExamCard();
  } else if (v === 'wrong') {
    document.getElementById('examWrongView').style.display = 'block';
    renderWrongList();
  }
}

function renderExamList() {
  let qs = getCurQuestions();
  // 섹션2·3 통합 필터 적용
  if (currentSection === 2 || currentSection === 3) {
    if (filterType !== 'all') qs = qs.filter(q => getCardType(q) === filterType);
    if (filterSubj !== 'all') qs = qs.filter(q => getSubjectForCard(q) === filterSubj);
    if (filterUniv !== 'all' && (currentSection === 2 || currentSection === 3)) {
      qs = qs.filter(q => {
        const u = q.univ || '공통';
        if (filterUniv === '공통') return u === '공통';
        // 특정 장소 필터 = 해당 장소 전용 + 공통 카드 모두 표시
        return u === filterUniv || u === '공통' || u.includes(filterUniv);
      });
    }
    if (filterStar !== 'all' && currentSection === 2) {
      qs = qs.filter(q => getCardStars(q) === parseInt(filterStar));
    }
  }
  const groups = {};
  qs.forEach((q, i) => {
    // 필터 적용 시 원본 인덱스로 마킹해야 하므로 originalIdx 보존
    const origIdx = getCurQuestions().indexOf(q);
    if (!groups[q.group]) groups[q.group] = [];
    groups[q.group].push({ q, i: origIdx });
  });
  // 빈출도 계산 함수
  function getFreq(q) {
    if (q.freq) return q.freq;
    if (currentSection === 2) return q.group && q.group.includes('🔥') ? 3 : 2;
    if (currentSection === 3) {
      const tip = q.tip || '';
      if (tip.match(/3[곳회]|다수|여러 조|최다|3곳/)) return 3;
      if (q.univ === '공통' && tip.includes('·')) return 3;
      if (tip.match(/2[회곳]/)) return 2;
      if (q.univ === '공통') return 2;
      return 1;
    }
    return 0;
  }
  function starHTML(freq) {
    if (!freq) return '';
    const stars = freq === 3 ? '★★★' : freq === 2 ? '★★☆' : '★☆☆';
    const col = freq === 3 ? '#f43f5e' : freq === 2 ? '#f0a030' : '#94a3b8';
    const label = freq === 3 ? '최빈출' : freq === 2 ? '빈출' : '출제';
    return `<span style="font-size:10px;font-weight:700;color:${col};letter-spacing:0;white-space:nowrap;" title="${label}">${stars}</span>`;
  }
  let html = '';
  for (const [group, items] of Object.entries(groups)) {
    html += `<div class="group-header">${group}</div>`;
    items.forEach(({ q, i }) => {
      const ok    = getCurChecked().has(i);
      const wrong = getCurWrong().has(i);
      const freq  = getFreq(q);
      const badge = ok    ? `<span class="exam-item-badge badge-ok">✅</span>`
                  : wrong ? `<span class="exam-item-badge badge-wrong">❌</span>` : '';
      html += `
        <div class="exam-item ${ok?'checked':''} ${wrong?'wrong-item':''}" id="item-${i}" onclick="toggleListItem(${i})">
          <div class="exam-item-header">
            <span class="exam-item-num">${String(i+1).padStart(2,'0')}</span>
            <div style="flex:1">
              <div style="display:flex;align-items:center;gap:6px;">
                ${(currentSection===2||currentSection===3)&&freq ? starHTML(freq) : ''}
                <div class="exam-item-q">${q.q}</div>
              </div>
            </div>
            ${badge}
          </div>
          <div class="exam-answer-expand" id="expand-${i}">
            ${q.answer.replace(/\n/g,'<br>')}
            ${q.tip ? `<div class="exam-tip">💡 ${q.tip}</div>` : ''}
            <div style="display:flex;gap:8px;margin-top:10px;">
              <button class="btn-ok" onclick="event.stopPropagation();markItem(${i},true)">✅ 알았어</button>
              <button class="btn-wrong-mark" onclick="event.stopPropagation();markItem(${i},false)">❌ 몰랐어</button>
            </div>
          </div>
        </div>`;
    });
  }
  document.getElementById('examList').innerHTML = html;

  updateFilterCounts();
}

function toggleListItem(i) {
  const el = document.getElementById(`expand-${i}`);
  el.style.display = el.style.display === 'block' ? 'none' : 'block';
}

function markItem(i, ok) {
  if (ok) { getCurChecked().add(i); getCurWrong().delete(i); }
  else     { getCurWrong().add(i);  getCurChecked().delete(i); }
  renderExamCount(); updateSectionCards();
  renderExamList();
  const el = document.getElementById(`expand-${i}`);
  if (el) el.style.display = 'block';
}

function updateFilterCounts() {
  try {
    const all = SECTION_QUESTIONS[currentSection] || [];
    function sc(id, n) {
      var el = document.getElementById(id);
      if (el) el.textContent = ' (' + n + ')';
    }
    // 유형 카운트 (현재 섹션 전체 기준)
    sc('cnt-tp-gul', all.filter(function(q){ return (q.type||'구술')==='구술'; }).length);
    sc('cnt-tp-sil', all.filter(function(q){ return q.type==='실기'; }).length);
    if (currentSection === 2) {
      // 장소 카운트
      var com=0, tr=0, dg=0;
      all.forEach(function(q){
        var u = q.univ||'공통';
        if(u==='공통') com++;
        else if(u==='태릉') tr++;
        else if(u==='대구보건') dg++;
        else com++;
      });
      sc('cnt-p2-all', all.length);
      sc('cnt-p2-com', com);
      sc('cnt-p2-taerung', tr);
      sc('cnt-p2-daegu', dg);
      // 별표 카운트
      var sc0=0,sc1=0,sc2=0,sc3=0,sc4=0,sc5=0;
      all.forEach(function(q){
        var m=(q.q||'').match(/^(★+)/);
        var n=m?Math.min(m[1].length,5):0;
        if(n===0)sc0++; else if(n===1)sc1++; else if(n===2)sc2++;
        else if(n===3)sc3++; else if(n===4)sc4++; else sc5++;
      });
      sc('cnt-st-all',all.length);
      sc('cnt-st-5',sc5); sc('cnt-st-4',sc4); sc('cnt-st-3',sc3);
      sc('cnt-st-2',sc2); sc('cnt-st-1',sc1); sc('cnt-st-0',sc0);
    }
    if (currentSection === 3) {
      sc('cnt-p3-dank', all.filter(function(q){ return q.univ==='단국대'; }).length);
      sc('cnt-p3-gyng', all.filter(function(q){ return q.univ==='경남대'; }).length);
      sc('cnt-p3-shin', all.filter(function(q){ return q.univ==='신한대'; }).length);
    }
  } catch(e) { console.warn('updateFilterCounts:', e); }
}


function renderExamCard() {
  const qs    = getCurQuestions();
  const total = examQueue.length;
  document.getElementById('examProgressFill').style.width = `${((examIdx+1)/total)*100}%`;
  document.getElementById('examProgressLabel').innerHTML =
    `<span>${examIdx+1} / ${total}</span><span>✅${getCurChecked().size} ❌${getCurWrong().size}</span>`;
  document.getElementById('examPrev').disabled = examIdx === 0;
  document.getElementById('examNext').disabled = examIdx === total-1;

  const qi = examQueue[examIdx];
  const q  = qs[qi];
  document.getElementById('examSub').textContent   = q.group;
  document.getElementById('examQ').textContent     = q.q;
  document.getElementById('examAnswer').innerHTML  =
    q.answer.replace(/\n/g,'<br>') +
    (q.tip ? `<div class="exam-tip">💡 ${q.tip}</div>` : '');
  document.getElementById('examHintBox').style.display = 'none';
  document.getElementById('examHintBtn').style.display = 'block';
}

function revealAnswer() {
  document.getElementById('examHintBox').style.display = 'block';
  document.getElementById('examHintBtn').style.display = 'none';
}

function markResult(ok) {
  const qi = examQueue[examIdx];
  if (ok) { getCurChecked().add(qi); getCurWrong().delete(qi); }
  else     { getCurWrong().add(qi);  getCurChecked().delete(qi); }
  renderExamCount(); updateSectionCards();
  const qs = getCurQuestions();
  if (examIdx < examQueue.length - 1) { examIdx++; renderExamCard(); }
  else {
    document.getElementById('examCardBox').innerHTML =
      `<div style="text-align:center; padding:30px 10px;">
        <div style="font-size:36px; margin-bottom:12px;">🎉</div>
        <div style="font-size:16px; font-weight:700; color:var(--text);">완료!</div>
        <div style="font-size:13px; color:var(--text-muted); margin-top:8px;">
          ✅ ${getCurChecked().size}개 · ❌ ${getCurWrong().size}개
        </div>
        ${getCurWrong().size > 0 ? `<button onclick="setExamView('wrong')" style="margin-top:16px; padding:10px 20px; background:${getCurColor()}; border:none; color:#fff; border-radius:10px; font-size:13px; font-weight:700; cursor:pointer; font-family:var(--sans);">오답 복습하기</button>` : ''}
      </div>`;
  }
}

function examMove(dir) {
  examIdx = Math.max(0, Math.min(examQueue.length-1, examIdx+dir));
  renderExamCard();
}

function renderWrongList() {
  const qs    = getCurQuestions();
  const wrong = getCurWrong();
  if (wrong.size === 0) {
    document.getElementById('examWrongList').innerHTML =
      `<div style="text-align:center; padding:40px 16px; color:var(--text-muted); font-size:14px;">
        ❌ 오답이 없어요!<br>
        <span style="font-size:12px; display:block; margin-top:8px;">순서 또는 랜덤 모드에서 문제를 풀면 오답이 기록돼요.</span>
      </div>`;
    return;
  }
  let html = `<div style="font-size:13px; color:var(--text-muted); margin-bottom:12px;">틀린 문제 ${wrong.size}개 — 다시 복습하세요</div>`;
  [...wrong].forEach(i => {
    const q = qs[i];
    html += `
      <div class="exam-item wrong-item" onclick="toggleListItem('w${i}')">
        <div class="exam-item-header">
          <span class="exam-item-num">${String(i+1).padStart(2,'0')}</span>
          <div style="flex:1"><div class="exam-item-q">${q.q}</div><div class="exam-item-group">${q.group}</div></div>
          <span class="exam-item-badge badge-wrong">❌</span>
        </div>
        <div class="exam-answer-expand" id="expand-w${i}">
          ${q.answer.replace(/\n/g,'<br>')}
          ${q.tip ? `<div class="exam-tip">💡 ${q.tip}</div>` : ''}
          <div style="display:flex;gap:8px;margin-top:10px;">
            <button class="btn-ok" onclick="event.stopPropagation();markItem(${i},true);renderWrongList()">✅ 이제 알겠어</button>
          </div>
        </div>
      </div>`;
  });
  document.getElementById('examWrongList').innerHTML = html;
}

document.addEventListener('DOMContentLoaded', function() {
  render();
});
