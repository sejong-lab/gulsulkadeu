<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>생활스포츠지도사 2급 보디빌딩 · 구술카드</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap');

  :root {
    --bg: #f4f5f8;
    --surface: #ffffff;
    --surface2: #eef0f5;
    --border: #d8dae6;
    --accent: #4a59e0;
    --accent2: #e05c5c;
    --accent3: #3ecf8e;
    --accent4: #f0a030;
    --text: #1a1c2a;
    --text-muted: #5a5f7a;
    --text-dim: #9aa0bb;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Noto Sans KR', sans-serif;
  }

  /* ── Dark mode ── */
  :root.dark {
    --bg: #0e0f13;
    --surface: #16181f;
    --surface2: #1e2029;
    --border: #2a2d3a;
    --accent: #5b6af0;
    --text: #e8eaf0;
    --text-muted: #7a7f96;
    --text-dim: #4a4f66;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  .theme-btn {
    margin-left: auto;
    width: 34px; height: 34px;
    border: 1px solid var(--border);
    background: var(--surface2);
    border-radius: 8px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    transition: all 0.2s ease;
    flex-shrink: 0;
  }
  .theme-btn:hover {
    border-color: var(--accent);
    background: var(--surface);
  }

  /* ── Header ── */
  .header {
    padding: 16px 16px 0;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .header-badge {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
    border: 1px solid var(--accent);
    padding: 3px 8px;
    border-radius: 4px;
  }
  .header-title {
    font-size: 13px;
    color: var(--text-muted);
    font-weight: 400;
  }

  /* ── Category tabs ── */
  .tabs {
    display: flex;
    gap: 6px;
    padding: 12px 16px 0;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }

  .tab {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 6px 12px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.18s ease;
  }
  .tab:hover { border-color: var(--accent); color: var(--text); }
  .tab.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .tab[data-cat="규정"] { --tab-c: var(--accent2); }
  .tab[data-cat="트레이닝"] { --tab-c: var(--accent4); }
  .tab[data-cat="해부학"] { --tab-c: var(--accent3); }
  .tab[data-cat="생리학"] { --tab-c: #a78bfa; }
  .tab[data-cat="영양학"] { --tab-c: #38bdf8; }
  .tab.active[data-cat] { background: var(--tab-c); border-color: var(--tab-c); }

  /* ── Progress ── */
  .progress-bar {
    margin: 12px 16px 0;
    height: 2px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.3s ease;
  }
  .progress-label {
    margin: 6px 16px 0;
    display: flex;
    justify-content: space-between;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
  }

  /* ── Card area ── */
  .card-area {
    padding: 12px 16px 16px;
    position: relative;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 18px 16px;
    display: flex;
    flex-direction: column;
    gap: 0;
    position: relative;
    overflow: hidden;
    animation: cardIn 0.25s ease;
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* category accent bar */
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--cat-color, var(--accent));
    border-radius: 16px 16px 0 0;
  }

  /* ── Card header ── */
  .card-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 16px;
  }
  .cat-tag {
    font-family: var(--mono);
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 4px;
    background: color-mix(in srgb, var(--cat-color, var(--accent)) 15%, transparent);
    color: var(--cat-color, var(--accent));
    border: 1px solid color-mix(in srgb, var(--cat-color, var(--accent)) 30%, transparent);
  }
  .card-num {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
    margin-left: auto;
  }

  /* ── Question ── */
  .question {
    font-size: 18px;
    font-weight: 700;
    line-height: 1.4;
    color: var(--text);
    margin-bottom: 14px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--border);
  }

  /* ── Summary ── */
  .summary-row {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    margin-bottom: 12px;
  }
  .summary-label {
    font-family: var(--mono);
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--cat-color, var(--accent));
    white-space: nowrap;
    margin-top: 2px;
    min-width: 40px;
  }
  .summary-text {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.5;
  }

  /* ── Answer flow ── */
  .flow {
    display: flex;
    align-items: center;
    gap: 4px;
    flex-wrap: nowrap;
    overflow-x: auto;
    scrollbar-width: none;
    margin-bottom: 14px;
    padding: 10px 12px;
    background: var(--surface2);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  .flow::-webkit-scrollbar { display: none; }
  .flow-label {
    font-family: var(--mono);
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-right: 4px;
    white-space: nowrap;
  }
  .flow-step {
    font-size: 11px;
    font-weight: 500;
    color: var(--text-muted);
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 3px 8px;
    border-radius: 4px;
    white-space: nowrap;
  }
  .flow-arrow {
    color: var(--text-dim);
    font-size: 10px;
    font-weight: 700;
  }

  /* ── Answer items ── */
  .answer-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 14px;
    flex: 1;
  }
  .answer-item {
    display: flex;
    gap: 10px;
    align-items: flex-start;
    padding: 7px 10px;
    background: var(--surface2);
    border-radius: 8px;
    border: 1px solid transparent;
    transition: border-color 0.15s;
  }
  .answer-item:hover { border-color: var(--border); }
  .answer-num {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 700;
    color: var(--cat-color, var(--accent));
    min-width: 18px;
    margin-top: 1px;
    flex-shrink: 0;
  }
  .answer-text {
    font-size: 13px;
    line-height: 1.55;
    color: var(--text);
    word-break: keep-all;
    overflow-wrap: break-word;
  }
  .answer-text em {
    font-style: normal;
    color: var(--cat-color, var(--accent));
    font-weight: 600;
  }
  .answer-text .arrow {
    color: var(--text-dim);
    font-family: var(--mono);
  }

  /* ── Keywords ── */
  .keywords-row {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }
  .kw-label {
    font-family: var(--mono);
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-dim);
    white-space: nowrap;
    margin-top: 3px;
  }
  .kw-chip {
    font-size: 11px;
    font-weight: 500;
    color: var(--text-muted);
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 2px 8px;
    border-radius: 20px;
  }

  /* ── Extra note ── */
  .extra {
    padding: 10px 12px;
    background: color-mix(in srgb, var(--cat-color, var(--accent)) 6%, var(--surface2));
    border-radius: 8px;
    border-left: 2px solid var(--cat-color, var(--accent));
    margin-top: auto;
  }
  .extra-label {
    font-family: var(--mono);
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--cat-color, var(--accent));
    margin-bottom: 5px;
  }
  .extra-text {
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.7;
  }
  .extra-text strong {
    color: var(--text);
    font-weight: 600;
  }

  /* ── Table in card ── */
  .mini-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 11px;
    margin-top: 4px;
  }
  .mini-table th {
    background: var(--surface);
    color: var(--text-muted);
    font-weight: 600;
    padding: 5px 8px;
    text-align: left;
    border-bottom: 1px solid var(--border);
  }
  .mini-table td {
    padding: 5px 8px;
    border-bottom: 1px solid var(--border);
    color: var(--text);
    vertical-align: top;
  }
  .mini-table tr:last-child td { border-bottom: none; }

  /* ── Nav buttons ── */
  .nav {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 0;
    padding: 0 16px 24px;
  }
  .nav-btn {
    flex: 1;
    padding: 14px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-muted);
    border-radius: 10px;
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.18s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .nav-btn:hover:not(:disabled) {
    background: var(--surface2);
    color: var(--text);
    border-color: var(--accent);
  }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }
  .nav-btn.next {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    font-weight: 700;
  }
  .nav-btn.next:hover:not(:disabled) {
    background: #6b7af5;
    border-color: #6b7af5;
  }

  /* ── Shuffle ── */
  .shuffle-btn {
    width: 44px; height: 44px;
    border: 1px solid var(--border);
    background: var(--surface);
    border-radius: 10px;
    color: var(--text-muted);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    transition: all 0.18s;
    flex-shrink: 0;
  }
  .shuffle-btn:hover { border-color: var(--accent4); color: var(--accent4); }


  /* ── 형광펜 하이라이트 ── */
  .question-hl {
    background: rgba(240,160,48,0.13);
    padding: 2px 5px;
    border-radius: 3px;
    border-bottom: 1.5px solid rgba(240,160,48,0.35);
    -webkit-box-decoration-break: clone;
    box-decoration-break: clone;
  }

  /* ── 블러 토글 버튼 ── */
  .answer-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 8px;
  }
  .answer-header-label {
    font-family: var(--mono);
    font-size: 9px; font-weight: 700; letter-spacing: .08em;
    text-transform: uppercase; color: var(--text-dim);
  }
  .blur-toggle {
    display: flex; align-items: center; gap: 4px;
    padding: 4px 10px;
    border: 1px solid var(--border);
    background: var(--surface2);
    border-radius: 6px;
    font-size: 11px; font-weight: 600; font-family: var(--sans);
    color: var(--text-muted); cursor: pointer;
    transition: all 0.18s;
  }
  .blur-toggle:hover { border-color: var(--accent); color: var(--accent); }
  .blur-toggle.active {
    background: color-mix(in srgb, var(--accent) 10%, var(--surface2));
    border-color: var(--accent); color: var(--accent);
  }

  /* ── 블러 & 스포트라이트 ── */
  .answer-item { cursor: pointer; }
  .answer-item.blurred .answer-text {
    filter: blur(5px); user-select: none; transition: filter .3s;
  }
  .answer-item.blurred .answer-num { opacity: .4; transition: opacity .3s; }
  .answer-item.focused {
    border-color: var(--cat-color, var(--accent)) !important;
    background: color-mix(in srgb, var(--cat-color, var(--accent)) 8%, var(--surface2));
  }
  .answer-item.dimmed { opacity: .3; transition: opacity .25s; }
  .hidden { display: none !important; }
  .stat-chip { display:inline-flex; align-items:center; gap:3px; font-size:10px; font-family:var(--mono); color:var(--text-muted); background:var(--border); padding:2px 8px; border-radius:10px; white-space:nowrap; }
  .xfl { font-size:9px; color:var(--text-dim); white-space:nowrap; font-family:var(--mono); letter-spacing:.05em; min-width:24px; flex-shrink:0; }
  .xfc { font-size:10px; opacity:0.55; margin-left:1px; vertical-align:middle; }
  .xfb { font-size:10px; font-weight:600; padding:4px 9px; border-radius:6px; border:1px solid var(--border); background:var(--surface); color:var(--text-muted); cursor:pointer; white-space:nowrap; flex-shrink:0; font-family:var(--sans); transition:all .15s; }
  .xfb.active-xf { background:var(--sec-color,var(--accent)); color:#fff; border-color:transparent; }
</style>

<body>

<div class="header">
  <span class="header-badge">2급 보디빌딩</span>
  <div id="ddayBadge" onclick="toggleDdayDate()" style="font-family:var(--mono); font-size:11px; font-weight:700; background:#f43f5e; color:#fff; padding:3px 9px; border-radius:20px; letter-spacing:.04em; cursor:pointer; user-select:none;"></div>
  <button class="theme-btn" id="themeBtn" onclick="toggleTheme()" title="테마 전환">🌙</button>
</div>

<div class="tabs" id="tabs">
  <button class="tab active" data-cat="전체" onclick="filterCat('전체', this)">전체</button>
  <button class="tab" data-cat="규정" onclick="filterCat('규정', this)">규정</button>
  <button class="tab" data-cat="트레이닝" onclick="filterCat('트레이닝', this)">트레이닝</button>
  <button class="tab" data-cat="해부학" onclick="filterCat('해부학', this)">해부학</button>
  <button class="tab" data-cat="생리학" onclick="filterCat('생리학', this)">생리학</button>
  <button class="tab" data-cat="영양학" onclick="filterCat('영양학', this)">영양학</button>
  <button class="tab tab-exam" data-cat="예상문제" onclick="openExamMode()">⚡ 예상문제</button>
</div>

<!-- ── 예상문제 모드 오버레이 ── -->
<div id="examOverlay" style="display:none; position:fixed; inset:0; background:var(--bg); z-index:100; overflow-y:auto; padding:0 0 60px;">

  <!-- 헤더 -->
  <div id="examHeader" style="padding:14px 16px 12px; display:flex; align-items:center; gap:10px; position:sticky; top:0; background:var(--bg); z-index:10; border-bottom:1px solid var(--border);">
    <button onclick="examBack()" style="border:1px solid var(--border); background:var(--surface); color:var(--text-muted); border-radius:8px; padding:6px 12px; font-size:12px; cursor:pointer; font-family:var(--sans);" id="examBackBtn">← 돌아가기</button>
    <span id="examHeaderTitle" style="font-size:14px; font-weight:700; color:var(--text);">⚡ 예상문제</span>
    <span id="examCount" style="font-size:11px; color:var(--text-dim); margin-left:auto; font-family:var(--mono);"></span>
  </div>

  <!-- ① 섹션 선택 화면 -->

let currentCat = '전체';
let filteredCards = [...ALL_CARDS];
let currentIndex = 0;
let blurOn = false;
let revealedItems = new Set();
let focusedItem = null;


function toggleBlur() {
  blurOn = !blurOn;
  revealedItems = new Set();
  focusedItem = null;
  reapplyCardState();
}

function tapItem(idx) {
  if (blurOn && !revealedItems.has(idx)) {
    revealedItems.add(idx);
  }
  focusedItem = (focusedItem === idx) ? null : idx;
  reapplyCardState();
}

function reapplyCardState() {
  const btn = document.querySelector('.blur-toggle');
  if (btn) {
    btn.classList.toggle('active', blurOn);
    btn.innerHTML = blurOn ? '🫣 가리는 중' : '👁 답 가리기';
  }
  document.querySelectorAll('#card .answer-item').forEach((el, i) => {
    const isBlurred = blurOn && !revealedItems.has(i);
    const isFocused = (focusedItem === i);
    const isDimmed = (focusedItem !== null) && !isFocused;
    el.classList.toggle('blurred', isBlurred);
    el.classList.toggle('focused', isFocused);
    el.classList.toggle('dimmed', isDimmed);
  });
}

function filterCat(cat, el) {
  currentCat = cat;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  filteredCards = cat === '전체' ? [...ALL_CARDS] : ALL_CARDS.filter(c => c.cat === cat);
  currentIndex = 0;
  revealedItems = new Set();
  focusedItem = null;
  render();
}

function move(dir) {
  currentIndex = Math.max(0, Math.min(filteredCards.length - 1, currentIndex + dir));
  revealedItems = new Set();
  focusedItem = null;
  render();
}

function shuffle() {
  for (let i = filteredCards.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [filteredCards[i], filteredCards[j]] = [filteredCards[j], filteredCards[i]];
  }
  currentIndex = 0;
  revealedItems = new Set();
  focusedItem = null;
  render();
}

function render() {
  const card = filteredCards[currentIndex];
  const total = filteredCards.length;
  const color = CAT_COLORS[card.cat] || '#5b6af0';

  // progress
  document.getElementById('progressFill').style.width = `${((currentIndex + 1) / total) * 100}%`;
  document.getElementById('progressText').textContent = `${currentIndex + 1} / ${total}`;
  document.getElementById('catLabel').textContent = currentCat === '전체' ? card.cat + ' · ' + card.sub : card.sub;

  // nav
  document.getElementById('prevBtn').disabled = currentIndex === 0;
  document.getElementById('nextBtn').disabled = currentIndex === total - 1;

  // flow html
  const flowHTML = card.flow.map(f =>
    f === '→' || f === '↔' || f === '←'
      ? `<span class="flow-arrow">${f}</span>`
      : `<span class="flow-step">${f}</span>`
  ).join('');

  // items html
  const itemsHTML = card.items.map((item, idx) => `
    <div class="answer-item" onclick="tapItem(${idx})">
      <span class="answer-num">${item.n}</span>
      <span class="answer-text">${item.t}</span>
    </div>
  `).join('');

  const blurHeaderHTML = `
    <div class="answer-header">
      <span class="answer-header-label">답변 항목</span>
      <button class="blur-toggle${blurOn ? ' active' : ''}" onclick="toggleBlur(); event.stopPropagation();">${blurOn ? '🫣 가리는 중' : '👁 답 가리기'}</button>
    </div>
  `;

  // keywords html
  const kwHTML = card.keywords.map(k => `<span class="kw-chip">${k}</span>`).join('');

  // extra html
  const extraHTML = card.extra ? `
    <div class="extra">
      <div class="extra-label">추가설명</div>
      <div class="extra-text">${card.extra.replace(/\n/g, '<br>')}</div>
    </div>
  ` : '';

  document.getElementById('card').style.setProperty('--cat-color', color);
  document.getElementById('card').innerHTML = `
    <div class="card-meta">
      <span class="cat-tag">${card.cat}</span>
      <span class="cat-tag" style="--cat-color:${color};opacity:0.7">${card.sub}</span>
      ${card.freq ? `<span style="font-size:11px;color:#f0a030;letter-spacing:-.5px;">${'★'.repeat(card.freq)}</span>` : ''}
      <span class="card-num">#${String(currentIndex + 1).padStart(2, '0')}</span>
    </div>
    <div class="question"><span class="question-hl">${card.q}</span></div>
    <div class="summary-row">
      <span class="summary-label">요약</span>
      <span class="summary-text">${card.summary}</span>
    </div>
    <div class="flow">
      <span class="flow-label">순서</span>
      ${flowHTML}
    </div>
    ${blurHeaderHTML}
    <div class="answer-list">${itemsHTML}</div>
    <div class="keywords-row">
      <span class="kw-label">키워드</span>
      ${kwHTML}
    </div>
    ${extraHTML}
  `;

  // re-animate
  const el = document.getElementById('card');
  el.style.animation = 'none';
  el.offsetHeight; // reflow
  el.style.animation = '';
  // 블러/스포트라이트 상태 적용
  reapplyCardState();
}

function toggleTheme() {
  const isDark = document.documentElement.classList.toggle('dark');
  document.getElementById('themeBtn').textContent = isDark ? '☀️' : '🌙';
}

let ddayShowDate = false;
(function() {
  const exam = new Date('2026-06-27T00:00:00');
  function tick() {
    const now = new Date();
    const diff = Math.ceil((exam - now) / 86400000);
    const el = document.getElementById('ddayBadge');
    const dateStr = '26.06.27(토)';
    if (diff > 0) el.textContent = ddayShowDate ? `${dateStr} D-${diff}` : `D-${diff} 시험까지`;
    else if (diff === 0) el.textContent = `${dateStr} D-DAY 🔥`;
    else el.textContent = `${dateStr} +${Math.abs(diff)}일`;
  }
  window._ddayTick = tick;
  tick();
  setInterval(tick, 60000);
})();
function toggleDdayDate() {
  ddayShowDate = !ddayShowDate;
  window._ddayTick();
}

function openCardMode(mode) {
  cmMode = mode;
  const overlay = document.getElementById('cardModeOverlay');
  overlay.style.display = 'block';
  document.getElementById('cmWrongSection').style.display = 'none';

  if (mode === 'wrong') {
    document.getElementById('cardModeTitle').textContent = '❌ 오답노트';
    document.getElementById('cmCardBox').style.display = 'none';
    document.getElementById('cmProgressFill').parentElement.style.display = 'none';
    document.getElementById('cmProgressLabel').style.display = 'none';
    document.querySelector('#cardModeOverlay > div:nth-child(2) > div:last-child').style.display = 'none';
    document.getElementById('cmWrongSection').style.display = 'block';
    renderCmWrongList();
    return;
  }

  document.getElementById('cmCardBox').style.display = 'block';
  document.getElementById('cmProgressFill').parentElement.style.display = 'block';
  document.getElementById('cmProgressLabel').style.display = 'flex';
  document.querySelector('#cardModeOverlay > div:nth-child(2) > div:last-child').style.display = 'flex';

  if (mode === 'seq') {
    document.getElementById('cardModeTitle').textContent = '순서 학습';
    cmQueue = filteredCards.map((_, i) => i);
  } else {
    document.getElementById('cardModeTitle').textContent = '🔀 랜덤 학습';
    cmQueue = [...filteredCards.keys()].sort(() => Math.random() - .5);
  }
  cmIdx = 0;
  renderCmCard();
}

function closeCardMode() {
  document.getElementById('cardModeOverlay').style.display = 'none';
}

function renderCmCard() {
  const total = cmQueue.length;
  const ci = cmQueue[cmIdx];
  const card = filteredCards[ci];
  const color = CAT_COLORS[card.cat] || '#5b6af0';

  document.getElementById('cmProgressFill').style.width = `${((cmIdx+1)/total)*100}%`;
  document.getElementById('cmProgressFill').style.background = color;
  document.getElementById('cmCardAccent').style.background = color;
  document.getElementById('cardModeCount').textContent = `${cmIdx+1}/${total} · ✅${cmCheckedSet.size} ❌${cmWrongSet.size}`;
  document.getElementById('cmProgressLabel').innerHTML =
    `<span>${cmIdx+1} / ${total}</span><span>${card.cat} · ${card.sub}</span>`;

  const isOk = cmCheckedSet.has(ci);
  const isWrong = cmWrongSet.has(ci);
  const statusBadge = isOk ? `<span style="font-size:10px;font-weight:700;background:#22c55e22;color:#22c55e;border:1px solid #22c55e44;padding:2px 7px;border-radius:20px;">✅</span>`
                   : isWrong ? `<span style="font-size:10px;font-weight:700;background:#f43f5e22;color:#f43f5e;border:1px solid #f43f5e44;padding:2px 7px;border-radius:20px;">❌</span>` : '';

  document.getElementById('cmCardMeta').innerHTML =
    `<span style="font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:${color};font-family:var(--mono);background:${color}22;border:1px solid ${color}44;padding:2px 8px;border-radius:4px;">${card.cat}</span>
     <span style="font-size:10px;color:var(--text-dim);font-family:var(--mono);">${card.freq ? '★'.repeat(Math.min(card.freq,3)) : ''}</span>
     ${statusBadge}`;
  document.getElementById('cmQ').textContent = card.q;

  const flowHTML = card.flow.map(f =>
    f==='→'||f==='↔'||f==='←' ? `<span style="color:var(--text-dim);font-family:var(--mono);font-size:10px;font-weight:700;">${f}</span>`
    : `<span style="font-size:11px;font-weight:500;color:var(--text-muted);background:var(--surface);border:1px solid var(--border);padding:3px 8px;border-radius:4px;">${f}</span>`
  ).join(' ');

  const itemsHTML = card.items.map(item =>
    `<div style="display:flex;gap:10px;align-items:flex-start;padding:7px 10px;background:var(--surface2);border-radius:8px;margin-bottom:6px;">

  ).join('');

  document.getElementById('cmSummary').textContent = card.summary;
  document.getElementById('cmItems').innerHTML =
    `<div style="display:flex;align-items:center;gap:4px;flex-wrap:nowrap;overflow-x:auto;scrollbar-width:none;padding:8px 10px;background:var(--surface2);border-radius:8px;border:1px solid var(--border);margin-bottom:12px;">${flowHTML}</div>` + itemsHTML;
  document.getElementById('cmExtra').innerHTML = card.extra
    ? `<span style="font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:${color};font-family:var(--mono);display:block;margin-bottom:5px;">추가설명</span>${card.extra}` : '';
  document.getElementById('cmExtra').style.display = card.extra ? 'block' : 'none';

  document.getElementById('cmHintBox').style.display = 'none';
  document.getElementById('cmHintBtn').style.display = 'block';
  document.getElementById('cmPrev').disabled = cmIdx === 0;
  document.getElementById('cmNext').disabled = cmIdx === total - 1;
}

function cmReveal() {
  document.getElementById('cmHintBox').style.display = 'block';
  document.getElementById('cmHintBtn').style.display = 'none';
}

function cmMark(ok) {
  const ci = cmQueue[cmIdx];
  if (ok) { cmCheckedSet.add(ci); cmWrongSet.delete(ci); }
  else { cmWrongSet.add(ci); cmCheckedSet.delete(ci); }
  updateWrongBadge();
  if (cmIdx < cmQueue.length - 1) { cmIdx++; renderCmCard(); }
  else {
    document.getElementById('cmCardBox').innerHTML =
      `<div style="text-align:center;padding:30px 10px;">
        <div style="font-size:36px;margin-bottom:12px;">🎉</div>
        <div style="font-size:16px;font-weight:700;color:var(--text);">완료!</div>
        <div style="font-size:13px;color:var(--text-muted);margin-top:8px;">✅ ${cmCheckedSet.size}개 · ❌ ${cmWrongSet.size}개</div>
        <button onclick="openCardMode('wrong')" style="margin-top:16px;padding:10px 20px;background:#f43f5e;border:none;color:#fff;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--sans);">오답 복습</button>
      </div>`;
  }
}

function cmMove(dir) {
  cmIdx = Math.max(0, Math.min(cmQueue.length-1, cmIdx+dir));
  renderCmCard();
}

function renderCmWrongList() {
  const wrongCards = [...cmWrongSet].map(i => ({ i, card: filteredCards[i] })).filter(x => x.card);
  const header = document.getElementById('cmWrongHeader');
  const list = document.getElementById('cmWrongList');
  if (wrongCards.length === 0) {
    header.textContent = '';
    list.innerHTML = `<div style="text-align:center;padding:40px 16px;color:var(--text-muted);font-size:14px;">❌ 오답이 없어요!<br><span style="font-size:12px;display:block;margin-top:8px;">순서 또는 랜덤 모드에서 학습하면 오답이 기록됩니다.</span></div>`;
    return;
  }
  header.textContent = `틀린 카드 ${wrongCards.length}개`;
  list.innerHTML = wrongCards.map(({ i, card }) => {
    const color = CAT_COLORS[card.cat] || '#5b6af0';
    return `<div style="background:var(--surface);border:1px solid #f43f5e44;border-radius:12px;padding:14px;margin-bottom:10px;cursor:pointer;" onclick="this.querySelector('.wAns').style.display=this.querySelector('.wAns').style.display==='none'?'block':'none'">
      <div style="font-size:10px;color:${color};font-family:var(--mono);font-weight:700;margin-bottom:6px;">${card.cat} · ${card.sub}</div>
      <div style="font-size:14px;font-weight:600;color:var(--text);word-break:keep-all;">${card.q}</div>
      <div class="wAns" style="display:none;margin-top:12px;padding-top:12px;border-top:1px solid var(--border);">
        <div style="font-size:13px;color:var(--text-muted);margin-bottom:8px;">${card.summary}</div>
        ${card.items.map(it=>`<div style="font-size:12px;color:var(--text);padding:4px 0;">${it.n} ${it.t.replace(/<[^>]+>/g,'')}</div>`).join('')}
        <button onclick="event.stopPropagation();cmWrongSet.delete(${i});cmCheckedSet.add(${i});updateWrongBadge();renderCmWrongList();" style="margin-top:10px;padding:7px 14px;background:#22c55e22;border:1px solid #22c55e55;color:#22c55e;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--sans);">✅ 이제 알겠어</button>
      </div>
    </div>`;
  }).join('');
}

// keyboard nav
document.addEventListener('keydown', e => {
  if (document.getElementById('examOverlay').style.display !== 'none') return;
  if (document.getElementById('cardModeOverlay').style.display !== 'none') {
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') cmMode !== 'wrong' && cmMove(1);
    if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') cmMode !== 'wrong' && cmMove(-1);
    if (e.key === ' ') { e.preventDefault(); cmReveal(); }
    return;
  }
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') move(1);
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') move(-1);
});

      tip: '"운동 후 30분 = 단백질+탄수화물 골든타임" — 비율은 1:2~3 (단백:탄수)' },
    { group: '★ 🧬 운동생리학 기출', q: '스포츠 보충제의 위험성을 설명하시오',

    { group: '★ 🧬 운동생리학 기출', q: '골격근의 구조와 기능을 설명하시오',
      answer: `【구조】\n근외막 → 근주막 → 근내막 → 근섬유 → 근원섬유 → 근절(Sarcomere)\n핵심 단백질: 액틴(가는 필라멘트) + 마이오신(굵은 필라멘트)\n\n【기능】\n① 운동 생성: 뼈·관절 움직임 생성 (수의적 수축)\n② 자세 유지: 중력에 대항해 체위 유지\n③ 관절 안정화: 관절 주변 근육이 구조적 안정성 제공\n④ 체온 생성: 근수축 시 열 발생 (안정 시 체열의 약 20~30% 담당, 운동 시 대폭 증가)\n⑤ 에너지 저장: 글리코겐·크레아틴 저장`,
      tip: '"근외막→근주막→근내막→근섬유→근원섬유→사근절" — 액틴·마이오신이 수축 주역' },
    { group: '★ 🧬 운동생리학 기출', q: '근육의 역할 3가지를 설명하시오',

      tip: '"운동·자세유지·열생성" — 3가지 핵심. 열생성=체온의 40% 근육에서' },
    { group: '★ 🧬 운동생리학 기출', q: '주동근·길항근·협력근의 역할을 설명하시오',
      answer: `① 주동근(Agonist/Prime Mover)\n   → 동작의 주역할 담당 근육\n   → 예: 바벨컬에서 상완이두근\n\n② 길항근(Antagonist)\n   → 주동근과 반대 방향 작용 근육\n   → 주동근 수축 시 이완하여 부드러운 움직임 조절\n   → 예: 바벨컬에서 상완삼두근\n\n③ 협력근(Synergist)\n   → 주동근의 움직임을 보조하는 근육\n   → 예: 바벨컬에서 완요골근`,

    { group: '★ 🧬 운동생리학 기출', q: '근력에 영향을 주는 3가지 요소를 설명하시오',
      answer: `① 근섬유 동원 수(모터 단위 수)\n   → 많은 근섬유가 동시 수축할수록 근력↑\n② 근육 단면적(CSA)\n   → 단면적이 클수록 더 큰 힘 발생 (비대 훈련 원리)\n③ 근섬유 유형\n   → 속근(Type II, 백근): 빠르고 강한 힘, 단시간\n   → 지근(Type I, 적근): 지구력 우수, 상대적 약한 힘\n\n【기타 영향 요인】 신경계 적응, 근육 길이-장력 관계, 관절 각도`,

      tip: '"혈류급증→팽창" — 산소·영양공급·노폐물제거·성장호르몬↑ 4가지 효과' },
    { group: '★ 🧬 운동생리학 기출', q: '근육 운동 시 심박수에 영향을 미치는 요인 3가지는?',
      answer: `① 운동 강도: 강도가 높을수록 심박수↑ (비례 관계)\n② 교감신경 활성화: 운동 시 교감신경 흥분 → 심박수↑\n③ 카테콜아민(에피네프린·노르에피네프린) 분비: 심박 자극\n\n【추가 요인】\n• 체력 수준: 훈련된 사람은 같은 강도에서 심박수 더 낮음\n• 환경(온도·습도): 더울수록 심박수↑\n• 정서 상태: 불안·긴장 시 심박수↑`,

    { group: '★ 🧬 운동생리학 기출', q: '최대심박수(HRmax)의 정의와 구하는 공식은?',
      answer: `【정의】 최대 강도 운동 시 도달 가능한 심박수의 최댓값\n\n【공식 (두 가지)】\n① 기본 공식: 220 − 나이\n   예) 30세 → 220−30 = 190bpm\n② 수정 공식(더 정확): 208 − (0.7 × 나이)\n   예) 30세 → 208−21 = 187bpm\n\n【활용】\n• 목표심박수 = (HRmax − 안정시HR) × 강도% + 안정시HR (Karvonen 공식)`,

    { group: '🏋️ 트레이닝·지도법 기출', q: '발살바 기법(Valsalva Maneuver)의 장단점을 설명하시오',

    { group: '🏋️ 트레이닝·지도법 기출', q: '트라이세트(Tri-set)와 자이언트세트(Giant set)를 설명하시오',

      tip: '"트라이세트=3개 / 자이언트세트=4개 이상" — 같은 근육 부위에 쉬지 않고 연속' },
    { group: '🏋️ 트레이닝·지도법 기출', q: '세트(Set)와 렙(Rep)을 설명하시오',
      answer: `【렙(Rep, Repetition)】\n운동 동작을 1회 완전히 수행하는 것\n예) 바벨컬을 한 번 올리고 내리면 1렙\n\n【세트(Set)】\n렙을 여러 번 반복하고 휴식하는 한 묶음\n예) 10렙을 하고 1~2분 쉬면 1세트\n\n【일반적 처방 예시】\n• 근력: 3~5세트 × 1~6렙 (고중량)\n• 근비대: 3~4세트 × 8~12렙 (중중량)\n• 근지구력: 2~3세트 × 15~20렙 (저중량)`,
      tip: '"렙=1회 동작 / 세트=렙 묶음+휴식" — 세트×렙×중량이 처방의 3요소' },
    { group: '🏋️ 트레이닝·지도법 기출', q: '준비운동(워밍업)과 정리운동(쿨다운)의 필요성을 설명하시오',
      answer: `【준비운동(워밍업)】\n① 근육·관절 온도↑ → 유연성·가동범위↑\n② 혈액순환↑ → 근육 산소 공급 개선\n③ 신경계 활성화 → 반응속도·협응력↑\n④ 부상 예방 (근육·인대 손상 위험↓)\n⑤ 심폐계 점진적 준비\n\n【정리운동(쿨다운)】\n① 젖산 등 대사산물 제거 가속\n② 근육통(DOMS) 완화\n③ 혈압·심박수 점진적 정상화\n④ 유연성 유지·향상 (정적 스트레칭)\n⑤ 부교감신경 활성화 → 회복 촉진`,
      tip: '"준비=온도↑·신경활성·부상예방 / 정리=젖산제거·근육통완화·회복"' },
    { group: '🏋️ 트레이닝·지도법 기출', q: '머신(Machine) 운동과 프리웨이트(Free Weight) 운동의 차이점은?',
      answer: `【머신 운동】\n• 고정된 궤적 → 자세 안정, 초보자 적합\n• 부상 위험 낮음\n• 타겟 근육 단독 자극에 유리\n• 단점: 신체에 맞지 않으면 근 발달 제한, 안정화 근육 발달 미흡\n\n【프리웨이트 운동】\n• 자유로운 궤적 → 다양한 근육 동원\n• 안정화 근육(코어 등) 추가 발달\n• 기능적 근력·협응력 향상\n• 단점: 잘못된 자세 → 부상 위험↑, 숙련자 필요\n\n✔ 초보자: 머신 우선 → 점진적 프리웨이트 도입`,

    { group: '★ 🧬 운동생리학 기출', q: '호흡교환율(RER, Respiratory Exchange Ratio)이란?',

function loadSavedPatches() {
  try {
    const saved = localStorage.getItem('gulsulPatches');
    if (!saved) return;
    const patches = JSON.parse(saved);
    patches.forEach(p => applyPatch(p, false));
  } catch(e) {}
}

function applyPatch(patch, save=true) {
  try {
    if (patch.type === 'add' && patch.section >= 0) {
      const cards = patch.cards || [];
      // 중복 방지: 같은 q가 없을 때만 추가
      const existing = new Set(SECTION_QUESTIONS[patch.section].map(c => c.q));
      const toAdd = cards.filter(c => !existing.has(c.q));
      SECTION_QUESTIONS[patch.section].push(...toAdd);
    }
    if (patch.type === 'replace' && patch.section >= 0 && patch.index >= 0) {
      SECTION_QUESTIONS[patch.section][patch.index] = patch.card;
    }
    if (save) {
      const saved = JSON.parse(localStorage.getItem('gulsulPatches') || '[]');
      saved.push(patch);
      localStorage.setItem('gulsulPatches', JSON.stringify(saved));
      updateSectionCards();
    }
  } catch(e) { alert('패치 적용 오류: ' + e.message); }
}

function calcSectionStats(secIdx) {
  const qs = SECTION_QUESTIONS[secIdx];
  // 대학/장소 수
  const places = new Set(qs.map(q => q.univ || (secIdx === 2 ? '태릉' : '공통'))
    .filter(u => u && u !== '공통'));
  // 조 수 (팁에서 "N조" 패턴 추출)
  const sessions = new Set();
  qs.forEach(q => {
    const m = (q.tip||'').match(/[가-힣]*\s*\d+조/g);
    if (m) m.forEach(s => sessions.add((q.univ||'')+s));
  });
  // 신유형 수
  const newTypes = qs.filter(q =>
    (q.tip||'').includes('신유형') || (q.group||'').includes('신유형')
  ).length;
  return {
    placeCount: places.size || 1,
    places: [...places],
    sessionCount: sessions.size,
    newTypes
  };
}

function updateSectionCards() {
  SECTIONS.forEach(({ id, color }) => {
    const qs = SECTION_QUESTIONS[id];
    const total = qs.length;
    const ok    = checkedSets[id].size;
    const wrong = wrongSets[id].size;
    const done  = ok + wrong;
    document.getElementById(`sec${id}badge`).textContent = total + "문제";
    document.getElementById(`sec${id}bar`).style.width = total ? `${(done/total)*100}%` : '0%';
    document.getElementById(`sec${id}bar`).style.background = color;
    document.getElementById(`sec${id}stat`).textContent =
      total > 1 ? `✅ ${ok}  ❌ ${wrong}  남은 ${total-done}문제` : '';
  });

  // ── 섹션2 칩 ──────────────────────────────────────────────
  const s2 = calcSectionStats(2);
  const s2place = document.getElementById('sec2-chip-place');
  const s2sess  = document.getElementById('sec2-chip-sess');
  const s2new   = document.getElementById('sec2-chip-new');
  if (s2place) {
    const label = s2.placeCount === 1 ? `📍 ${s2.places[0]||'태릉'} 1곳` : `📍 ${s2.placeCount}개 장소`;
    s2place.textContent = label;
  }
  if (s2sess) {
    // 섹션2 팁엔 직접 조 번호 없음 → 116p 후기 기준 고정
    s2sess.textContent = '👥 50개+ 조 후기 (6/13~15)';
  }
  if (s2new) {
    s2new.textContent = s2.newTypes > 0 ? `✨ ${s2.newTypes}개 신유형` : '✨ 신규 출제유형';
    s2new.style.display = 'inline-flex';
  }

  // ── 섹션3 칩 ──────────────────────────────────────────────
  const s3 = calcSectionStats(3);
  const s3univ = document.getElementById('sec3-chip-univ');
  const s3sess = document.getElementById('sec3-chip-sess');
  const s3new  = document.getElementById('sec3-chip-new');
  if (s3univ) s3univ.textContent = `🏫 ${s3.placeCount}개 대학`;
  if (s3sess) {
    s3sess.textContent = s3.sessionCount > 0
      ? `👥 ${s3.sessionCount}개 조`
      : '👥 多수 조';
  }
  if (s3new) {
    if (s3.newTypes > 0) {
      s3new.textContent = `✨ ${s3.newTypes}개 신유형`;
      s3new.style.display = 'inline-flex';
    }
  }
}

function getSubjectForCard(q) {
  if (q.subj) return q.subj;
  const g = q.group || '';
  const t = q.q || '';
  // 섹션2 그룹 이모지 기준
  if (g.includes('🚑')) return '스포츠 안전';
  if (g.includes('⚖️')) return '도핑 방지';
  if (g.includes('🧬')) return '운동생리학';
  if (g.includes('🦴')) return '기능해부학';
  if (g.includes('🥗')) return '스포츠 영양학';
  if (g.includes('🏋️')) {
    if (t.includes('생활체육')) return '생활체육';
    return '트레이닝론';
  }
  if (g.includes('🏆') || g.includes('포징')) return '경기 규정';
  if (g.includes('🤝')) return '스포츠 인권';
  if (g.includes('💚')) return '생활체육';
  if (g.includes('🔤')) return '기능해부학';
  if (g.includes('🔥')) {
    if (t.includes('인권') || t.includes('SNS') || t.includes('신체 접촉')) return '스포츠 인권';
    return '운동생리학';
  }
  // 섹션0·1 그룹 텍스트 기준
  if (g.includes('🔬')) return '운동생리학';
  if (g.includes('💊') || g.includes('보충제')) return '스포츠 영양학';
  if (g.includes('🏆 IFBB') || g.includes('⚖️ IFBB') || g.includes('IFBB 규정')) return '경기 규정';
  if (g.includes('🚫 도핑')) return '도핑 방지';
  // 섹션3 그룹 텍스트 기준
  if (g.includes('경기규정')) return '경기 규정';
  if (g.includes('스포츠안전') || g.includes('응급처치')) return '스포츠 안전';
  if (g.includes('해부학')) return '기능해부학';
  if (g.includes('트레이닝')) return '트레이닝론';
  if (g.includes('생활체육')) return '생활체육';
  if (g.includes('영양학')) return '스포츠 영양학';
  if (g.includes('도핑')) return '도핑 방지';
  if (g.includes('인권') || g.includes('윤리')) return '스포츠 인권';
  if (g.includes('생리학') || g.includes('운동생리')) return '운동생리학';
  return '기타';
}

function getCardType(q) {
  if (q.type) return q.type;
  const t = q.q || '';
  const g = q.group || '';
  // 실시·시행 요청 카드 → 실기
  if (t.includes('실시하시오') || t.includes('시행하시오') || t.includes('시연하시오') || t.includes('보여주세요')) return '실기';
  if (g.includes('트레이닝 실기') || (g.includes('실기·동작') && !t.includes('설명하시오') && !t.includes('차이점'))) return '실기';
  if (g.includes('포징 시연')) return '실기';
  return '구술';
}

function getCardStars(q) {
  if (q.freq) return Math.min(q.freq, 5);
  const m = (q.q || '').match(/^(★+)/);
  return m ? Math.min(m[1].length, 5) : 0;
}


function getCardUniv(q) {
  if (q.univ) return q.univ;
  if (currentSection === 2) return '태릉';
  return '공통';
}

function setXFilter(dim, val, btn) {
  if (dim === 'type') filterType = val;
  if (dim === 'subj') filterSubj = val;
  if (dim === 'univ') filterUniv = val;
  if (dim === 'star') filterStar = val;
  // 같은 차원의 버튼 모두 비활성화
  const prefix = dim === 'type' ? 'xf-tp-' : dim === 'subj' ? 'xf-sb-' : dim === 'star' ? 'xf-st-' : 'xf-p';
  document.querySelectorAll('#examFilterBar .xfb').forEach(b => {
    if (b.id.startsWith(prefix)) b.classList.remove('active-xf');
  });
  btn.classList.add('active-xf');
  renderExamList();
  updateFilterCounts();
}


function getFreqForPrint(q) {
  if (q.freq) return q.freq;
  if (currentSection === 2) return q.group && q.group.includes('🔥') ? 3 : 2;
  if (currentSection === 3) {
    const tip = q.tip || '';
    if (tip.match(/3[곳회]|다수|여러 조|최다/)) return 3;
    if (q.univ === '공통' && tip.includes('·')) return 3;
    if (tip.match(/2[회곳]/)) return 2;
    if (q.univ === '공통') return 2;
    return 1;
  }
  return 0;
}

function printSection() {
  const qs = getCurQuestions();
  const secName = SECTIONS[currentSection].name;
  const secColor = SECTIONS[currentSection].color;

  // 그룹별 정리
  const groups = {};
  qs.forEach((q) => {
    if (!groups[q.group]) groups[q.group] = [];
    groups[q.group].push(q);
  });

  let bodyHtml = '';
  for (const [group, items] of Object.entries(groups)) {
    bodyHtml += `<div class="ph-group">${group}</div>`;
    items.forEach((q, idx) => {
      const freq = getFreqForPrint(q);
      const stars = freq===3?'★★★':freq===2?'★★☆':freq===1?'★☆☆':'';
      const starCol = freq===3?'#e53e3e':freq===2?'#d97706':'#94a3b8';
      bodyHtml += `
        <div class="ph-card">
          <div class="ph-q">
            ${stars ? `<span style="color:${starCol};font-size:11px;font-weight:700;margin-right:6px;letter-spacing:0;">${stars}</span>` : ''}
            ${q.q}
          </div>
          <div class="ph-a">${q.answer.replace(/\n/g,'<br>')}</div>
          ${q.tip ? `<div class="ph-tip">💡 ${q.tip}</div>` : ''}
        </div>`;
    });
  }

  const printHTML = `<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>${secName} · 인쇄본</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'Noto Sans KR',sans-serif; font-size:11px; color:#111; background:#fff; padding:12mm 14mm; }
  h1 { font-size:16px; font-weight:700; margin-bottom:4px; color:#111; border-bottom:2px solid ${secColor}; padding-bottom:6px; }
  .meta { font-size:9px; color:#666; margin-bottom:10px; }
  .ph-group { font-size:9px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:#888; border-bottom:1px solid #ddd; padding:6px 0 3px; margin:10px 0 4px; }
  .ph-card { border:1px solid #e5e7eb; border-left:3px solid ${secColor}; padding:6px 8px; margin-bottom:5px; page-break-inside:avoid; background:#fafafa; }
  .ph-q { font-size:11px; font-weight:700; color:#111; margin-bottom:4px; line-height:1.4; }
  .ph-a { font-size:10px; color:#333; line-height:1.6; white-space:pre-wrap; }
  .ph-tip { font-size:9px; color:#666; margin-top:4px; padding:3px 6px; background:#f0f4ff; border-radius:3px; }
  .star-legend { font-size:9px; color:#666; margin-bottom:8px; display:flex; gap:12px; }
  .star-legend span { display:flex; align-items:center; gap:3px; }
  @media print {
    * { -webkit-print-color-adjust:exact !important; print-color-adjust:exact !important; }
    body { padding:8mm 10mm; }
    .ph-card { page-break-inside:avoid; }
    .ph-group { page-break-after:avoid; }
  }
</style>
</head>
<body>
<h1>${secName}</h1>
<div class="meta">생활스포츠지도사 2급 보디빌딩 · 구술카드 인쇄본 · 총 ${qs.length}문항</div>
<div class="star-legend">
  <span><span style="color:#e53e3e;font-weight:700;">★★★</span> 최빈출</span>
  <span><span style="color:#d97706;font-weight:700;">★★☆</span> 빈출</span>
  <span><span style="color:#94a3b8;font-weight:700;">★☆☆</span> 출제</span>
</div>
${bodyHtml}
</body></html>`;

  const w = window.open('', '_blank');
  if (!w) { alert('팝업이 차단되었습니다. 팝업 허용 후 다시 시도해주세요.'); return; }
  w.document.write(printHTML);
  w.document.close();
  setTimeout(() => w.print(), 600);
}

function closeExamMode() {
  document.getElementById('examOverlay').style.display = 'none';
  document.documentElement.style.removeProperty('--sec-color');
}

function examBack() {
  // handled by onclick on button
}

function renderExamCount() {
  const qs    = getCurQuestions();
  const total = qs.length;
  const ok    = getCurChecked().size;
  const wrong = getCurWrong().size;
  document.getElementById('examCount').textContent = `✅${ok} ❌${wrong} / ${total}`;
}

function setExamView(v) {
  examView = v;
  ['List','Card','Shuffle','Wrong'].forEach(n => {
    document.getElementById('examListView').style.display  = 'none';
    document.getElementById('examCardView').style.display  = 'none';
    document.getElementById('examWrongView').style.display = 'none';
    document.getElementById('btn'+n).classList.remove('active-mode');
  });
  const key = v.charAt(0).toUpperCase() + v.slice(1);
  if (document.getElementById('btn'+key)) document.getElementById('btn'+key).classList.add('active-mode');
  if (v === 'list') {
    document.getElementById('examListView').style.display = 'block';
    renderExamList();
  } else if (v === 'card') {
    document.getElementById('examCardView').style.display = 'block';
    examQueue = [...getCurQuestions().keys()];
    examIdx = 0; renderExamCard();
  } else if (v === 'shuffle') {
    document.getElementById('examCardView').style.display = 'block';
    examQueue = [...getCurQuestions().keys()].sort(() => Math.random() - .5);
    examIdx = 0; renderExamCard();
  } else if (v === 'wrong') {
    document.getElementById('examWrongView').style.display = 'block';
    renderWrongList();
  }
}

function renderExamList() {
  let qs = getCurQuestions();
  // 섹션2·3 통합 필터 적용
  if (currentSection === 2 || currentSection === 3) {
    if (filterType !== 'all') qs = qs.filter(q => getCardType(q) === filterType);
    if (filterSubj !== 'all') qs = qs.filter(q => getSubjectForCard(q) === filterSubj);
    if (filterUniv !== 'all' && (currentSection === 2 || currentSection === 3)) {
      qs = qs.filter(q => {
        const u = q.univ || '공통';
        if (filterUniv === '공통') return u === '공통';
        // 특정 장소 필터 = 해당 장소 전용 + 공통 카드 모두 표시
        return u === filterUniv || u === '공통' || u.includes(filterUniv);
      });
    }
    if (filterStar !== 'all' && currentSection === 2) {
      qs = qs.filter(q => getCardStars(q) === parseInt(filterStar));
    }
  }
  const groups = {};
  qs.forEach((q, i) => {
    // 필터 적용 시 원본 인덱스로 마킹해야 하므로 originalIdx 보존
    const origIdx = getCurQuestions().indexOf(q);
    if (!groups[q.group]) groups[q.group] = [];
    groups[q.group].push({ q, i: origIdx });
  });
  // 빈출도 계산 함수
  function getFreq(q) {
    if (q.freq) return q.freq;
    if (currentSection === 2) return q.group && q.group.includes('🔥') ? 3 : 2;
    if (currentSection === 3) {
      const tip = q.tip || '';
      if (tip.match(/3[곳회]|다수|여러 조|최다|3곳/)) return 3;
      if (q.univ === '공통' && tip.includes('·')) return 3;
      if (tip.match(/2[회곳]/)) return 2;
      if (q.univ === '공통') return 2;
      return 1;
    }
    return 0;
  }
  function starHTML(freq) {
    if (!freq) return '';
    const stars = freq === 3 ? '★★★' : freq === 2 ? '★★☆' : '★☆☆';
    const col = freq === 3 ? '#f43f5e' : freq === 2 ? '#f0a030' : '#94a3b8';
    const label = freq === 3 ? '최빈출' : freq === 2 ? '빈출' : '출제';
    return `<span style="font-size:10px;font-weight:700;color:${col};letter-spacing:0;white-space:nowrap;" title="${label}">${stars}</span>`;
  }
  let html = '';
  for (const [group, items] of Object.entries(groups)) {
    html += `<div class="group-header">${group}</div>`;
    items.forEach(({ q, i }) => {
      const ok    = getCurChecked().has(i);
      const wrong = getCurWrong().has(i);
      const freq  = getFreq(q);
      const badge = ok    ? `<span class="exam-item-badge badge-ok">✅</span>`
                  : wrong ? `<span class="exam-item-badge badge-wrong">❌</span>` : '';
      html += `
        <div class="exam-item ${ok?'checked':''} ${wrong?'wrong-item':''}" id="item-${i}" onclick="toggleListItem(${i})">
          <div class="exam-item-header">
            <span class="exam-item-num">${String(i+1).padStart(2,'0')}</span>
            <div style="flex:1">
              <div style="display:flex;align-items:center;gap:6px;">
                ${(currentSection===2||currentSection===3)&&freq ? starHTML(freq) : ''}
                <div class="exam-item-q">${q.q}</div>
              </div>
            </div>
            ${badge}
          </div>
          <div class="exam-answer-expand" id="expand-${i}">
            ${q.answer.replace(/\n/g,'<br>')}
            ${q.tip ? `<div class="exam-tip">💡 ${q.tip}</div>` : ''}
            <div style="display:flex;gap:8px;margin-top:10px;">
              <button class="btn-ok" onclick="event.stopPropagation();markItem(${i},true)">✅ 알았어</button>
              <button class="btn-wrong-mark" onclick="event.stopPropagation();markItem(${i},false)">❌ 몰랐어</button>
            </div>
          </div>
        </div>`;
    });
  }
  document.getElementById('examList').innerHTML = html;

  updateFilterCounts();
}

function toggleListItem(i) {
  const el = document.getElementById(`expand-${i}`);
  el.style.display = el.style.display === 'block' ? 'none' : 'block';
}

function markItem(i, ok) {
  if (ok) { getCurChecked().add(i); getCurWrong().delete(i); }
  else     { getCurWrong().add(i);  getCurChecked().delete(i); }
  renderExamCount(); updateSectionCards();
  renderExamList();
  const el = document.getElementById(`expand-${i}`);
  if (el) el.style.display = 'block';
}

function updateFilterCounts() {
  try {
    const all = SECTION_QUESTIONS[currentSection] || [];
    function sc(id, n) {
      var el = document.getElementById(id);
      if (el) el.textContent = ' (' + n + ')';
    }
    // 유형 카운트 (현재 섹션 전체 기준)
    sc('cnt-tp-gul', all.filter(function(q){ return (q.type||'구술')==='구술'; }).length);
    sc('cnt-tp-sil', all.filter(function(q){ return q.type==='실기'; }).length);
    if (currentSection === 2) {
      // 장소 카운트
      var com=0, tr=0, dg=0;
      all.forEach(function(q){
        var u = q.univ||'공통';
        if(u==='공통') com++;
        else if(u==='태릉') tr++;
        else if(u==='대구보건') dg++;
        else com++;
      });
      sc('cnt-p2-all', all.length);
      sc('cnt-p2-com', com);
      sc('cnt-p2-taerung', tr);
      sc('cnt-p2-daegu', dg);
      // 별표 카운트
      var sc0=0,sc1=0,sc2=0,sc3=0,sc4=0,sc5=0;
      all.forEach(function(q){
        var m=(q.q||'').match(/^(★+)/);
        var n=m?Math.min(m[1].length,5):0;
        if(n===0)sc0++; else if(n===1)sc1++; else if(n===2)sc2++;
        else if(n===3)sc3++; else if(n===4)sc4++; else sc5++;
      });
      sc('cnt-st-all',all.length);
      sc('cnt-st-5',sc5); sc('cnt-st-4',sc4); sc('cnt-st-3',sc3);
      sc('cnt-st-2',sc2); sc('cnt-st-1',sc1); sc('cnt-st-0',sc0);
    }
    if (currentSection === 3) {
      sc('cnt-p3-dank', all.filter(function(q){ return q.univ==='단국대'; }).length);
      sc('cnt-p3-gyng', all.filter(function(q){ return q.univ==='경남대'; }).length);
      sc('cnt-p3-shin', all.filter(function(q){ return q.univ==='신한대'; }).length);
    }
  } catch(e) { console.warn('updateFilterCounts:', e); }
}


function renderExamCard() {
  const qs    = getCurQuestions();
  const total = examQueue.length;
  document.getElementById('examProgressFill').style.width = `${((examIdx+1)/total)*100}%`;
  document.getElementById('examProgressLabel').innerHTML =
    `<span>${examIdx+1} / ${total}</span><span>✅${getCurChecked().size} ❌${getCurWrong().size}</span>`;
  document.getElementById('examPrev').disabled = examIdx === 0;
  document.getElementById('examNext').disabled = examIdx === total-1;

  const qi = examQueue[examIdx];
  const q  = qs[qi];
  document.getElementById('examSub').textContent   = q.group;
  document.getElementById('examQ').textContent     = q.q;
  document.getElementById('examAnswer').innerHTML  =
    q.answer.replace(/\n/g,'<br>') +
    (q.tip ? `<div class="exam-tip">💡 ${q.tip}</div>` : '');
  document.getElementById('examHintBox').style.display = 'none';
  document.getElementById('examHintBtn').style.display = 'block';
}

function revealAnswer() {
  document.getElementById('examHintBox').style.display = 'block';
  document.getElementById('examHintBtn').style.display = 'none';
}

function markResult(ok) {
  const qi = examQueue[examIdx];
  if (ok) { getCurChecked().add(qi); getCurWrong().delete(qi); }
  else     { getCurWrong().add(qi);  getCurChecked().delete(qi); }
  renderExamCount(); updateSectionCards();
  const qs = getCurQuestions();
  if (examIdx < examQueue.length - 1) { examIdx++; renderExamCard(); }
  else {
    document.getElementById('examCardBox').innerHTML =
      `<div style="text-align:center; padding:30px 10px;">
        <div style="font-size:36px; margin-bottom:12px;">🎉</div>
        <div style="font-size:16px; font-weight:700; color:var(--text);">완료!</div>
        <div style="font-size:13px; color:var(--text-muted); margin-top:8px;">
          ✅ ${getCurChecked().size}개 · ❌ ${getCurWrong().size}개
        </div>
        ${getCurWrong().size > 0 ? `<button onclick="setExamView('wrong')" style="margin-top:16px; padding:10px 20px; background:${getCurColor()}; border:none; color:#fff; border-radius:10px; font-size:13px; font-weight:700; cursor:pointer; font-family:var(--sans);">오답 복습하기</button>` : ''}
      </div>`;
  }
}

function examMove(dir) {
  examIdx = Math.max(0, Math.min(examQueue.length-1, examIdx+dir));
  renderExamCard();
}

function renderWrongList() {
  const qs    = getCurQuestions();
  const wrong = getCurWrong();
  if (wrong.size === 0) {
    document.getElementById('examWrongList').innerHTML =
      `<div style="text-align:center; padding:40px 16px; color:var(--text-muted); font-size:14px;">
        ❌ 오답이 없어요!<br>
        <span style="font-size:12px; display:block; margin-top:8px;">순서 또는 랜덤 모드에서 문제를 풀면 오답이 기록돼요.</span>
      </div>`;
    return;
  }
  let html = `<div style="font-size:13px; color:var(--text-muted); margin-bottom:12px;">틀린 문제 ${wrong.size}개 — 다시 복습하세요</div>`;
  [...wrong].forEach(i => {
    const q = qs[i];
    html += `
      <div class="exam-item wrong-item" onclick="toggleListItem('w${i}')">
        <div class="exam-item-header">
          <span class="exam-item-num">${String(i+1).padStart(2,'0')}</span>
          <div style="flex:1"><div class="exam-item-q">${q.q}</div><div class="exam-item-group">${q.group}</div></div>
          <span class="exam-item-badge badge-wrong">❌</span>
        </div>
        <div class="exam-answer-expand" id="expand-w${i}">
          ${q.answer.replace(/\n/g,'<br>')}
          ${q.tip ? `<div class="exam-tip">💡 ${q.tip}</div>` : ''}
          <div style="display:flex;gap:8px;margin-top:10px;">
            <button class="btn-ok" onclick="event.stopPropagation();markItem(${i},true);renderWrongList()">✅ 이제 알겠어</button>
          </div>
        </div>
      </div>`;
  });
  document.getElementById('examWrongList').innerHTML = html;
}

document.addEventListener('DOMContentLoaded', function() {
  render();
});
</script>

</html>
